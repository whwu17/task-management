<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="browser" content="chrome">
    <title>Obsidian Task Manager - Single Page</title>
    <style>
        :root {
            /* Light mode colors */
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e0e0e0;
            --accent-color: #007acc;
            --accent-hover: #005a9e;
            --tag-bg: #e3f2fd;
            --tag-color: #1976d2;
            --tag-hover: #bbdefb;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --error-color: #f44336;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            /* Dark mode colors */
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --text-muted: #707070;
            --border-color: #2a2a4a;
            --accent-color: #4fc3f7;
            --accent-hover: #29b6f6;
            --tag-bg: #1e3a5f;
            --tag-color: #81d4fa;
            --tag-hover: #2a4a7a;
            --success-color: #66bb6a;
            --warning-color: #ffb74d;
            --error-color: #e57373;
            --shadow: rgba(0,0,0,0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-primary: #1a1a2e;
                --bg-secondary: #16213e;
                --bg-tertiary: #0f3460;
                --text-primary: #eaeaea;
                --text-secondary: #a0a0a0;
                --text-muted: #707070;
                --border-color: #2a2a4a;
                --accent-color: #4fc3f7;
                --accent-hover: #29b6f6;
                --tag-bg: #1e3a5f;
                --tag-color: #81d4fa;
                --tag-hover: #2a4a7a;
                --success-color: #66bb6a;
                --warning-color: #ffb74d;
                --error-color: #e57373;
                --shadow: rgba(0,0,0,0.3);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .folder-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .folder-selector button {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .folder-selector button:hover {
            background: var(--accent-hover);
        }

        .folder-selector button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .current-folder {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--border-color);
        }

        .stat-number {
            font-weight: 600;
            color: var(--accent-color);
        }

        .status-info {
            color: var(--accent-color);
        }

        .status-question {
            color: #9c27b0;
        }

        .status-quote {
            color: #e91e63;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 200px);
        }

        .sidebar {
            background: var(--bg-secondary);
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            padding: 20px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .sidebar h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--text-primary);
        }

        .filter-section {
            margin-bottom: 25px;
        }

        .filter-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
        }

        .filter-section input,
        .filter-section select {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .filter-section select {
            cursor: pointer;
        }

        .filter-section input:focus,
        .filter-section select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            accent-color: var(--accent-color);
        }

        .tag-cloud {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .tag-pill {
            background: var(--tag-bg);
            color: var(--tag-color);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            display: inline-block;
            margin: 1px 0;
        }

        .tag-pill:hover {
            background: var(--tag-hover);
        }

        .tag-pill.active {
            background: var(--accent-color);
            color: white;
        }

        .tag-hierarchy-item {
            display: flex;
            align-items: center;
            margin: 2px 0;
        }

        .tag-hierarchy-item .tag-pill {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .tag-hierarchy-item .tag-pill:hover {
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .tag-hierarchy-item .tag-pill.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .task-area {
            background: var(--bg-secondary);
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .task-header {
            background: var(--bg-tertiary);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-header h2 {
            font-size: 18px;
            color: var(--text-primary);
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .task-actions button {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .task-actions button:hover {
            background: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .task-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: background-color 0.2s;
        }

        .task-item:hover {
            background-color: var(--bg-tertiary);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item.selected {
            background-color: rgba(79, 195, 247, 0.15);
            border-left: 3px solid var(--accent-color);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-top: 2px;
        }

        .task-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-subitems {
            margin-left: 24px;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border-left: 3px solid var(--border-color);
            border-radius: 0 4px 4px 0;
        }

        .task-subitem {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            padding: 2px 0;
        }

        .task-status-icon {
            font-size: 16px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .task-text {
            font-size: 14px;
            line-height: 1.4;
            cursor: pointer;
            padding: 4px;
            border-radius: 3px;
            transition: background-color 0.2s;
            color: var(--text-primary);
        }

        .task-text:hover {
            background-color: var(--bg-primary);
        }

        .task-text.editing {
            background-color: var(--bg-secondary);
            border: 1px solid var(--accent-color);
            outline: none;
        }

        .task-meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            align-items: center;
        }

        .task-tag {
            background: var(--tag-bg);
            color: var(--tag-color);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .task-tag:hover {
            background: var(--tag-hover);
        }

        .task-due {
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .task-due.overdue {
            color: var(--error-color);
            font-weight: 500;
        }

        .task-due.today {
            color: var(--warning-color);
            font-weight: 500;
        }

        .task-file {
            color: var(--text-muted);
            font-style: italic;
            font-size: 11px;
        }

        .task-item-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-item:hover .task-item-actions {
            opacity: 1;
        }

        .task-item-actions button {
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-primary);
        }

        .task-item-actions button:hover {
            background: var(--bg-primary);
            border-color: var(--accent-color);
        }

        .bulk-select-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-right: 8px;
        }

        .bulk-actions {
            background: var(--bg-tertiary);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: none;
            align-items: center;
            gap: 15px;
        }

        .bulk-actions.active {
            display: flex;
        }

        .bulk-actions-info {
            flex: 1;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .bulk-actions-buttons {
            display: flex;
            gap: 10px;
        }

        .bulk-actions button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .bulk-actions button:hover {
            background: #f0f0f0;
        }

        .bulk-actions button.btn-primary {
            background: #007acc;
            color: white;
            border-color: #007acc;
        }

        .bulk-actions button.btn-primary:hover {
            background: #005a9e;
        }

        .tag-replace-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .tag-replace-modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tag-replace-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .tag-replace-header {
            margin-bottom: 20px;
        }

        .tag-replace-header h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .tag-replace-options {
            margin-bottom: 20px;
        }

        .replace-option {
            margin-bottom: 15px;
        }

        .replace-option label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
        }

        .replace-option input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .replace-option input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .replace-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .status-pending { color: var(--text-secondary); }
        .status-done { color: var(--success-color); text-decoration: line-through; }
        .status-cancelled { color: var(--text-muted); text-decoration: line-through; }
        .status-important { color: var(--warning-color); font-weight: 500; }
        .status-in-progress { color: var(--accent-color); font-weight: 500; }
        .status-info { color: #ba68c8; font-weight: 500; }

        .timeline-view {
            padding: 20px;
        }

        .timeline-category {
            margin-bottom: 30px;
        }

        .timeline-category h3 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent-color);
        }

        .timeline-tasks {
            position: relative;
            padding-left: 30px;
        }

        .timeline-tasks::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border-color);
        }

        .timeline-task {
            position: relative;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .timeline-task::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
            border: 3px solid var(--bg-secondary);
        }

        .timeline-task.completed::before {
            background: var(--success-color);
        }

        .timeline-task.overdue::before {
            background: var(--error-color);
        }

        .timeline-task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .timeline-task-date {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            min-width: 90px;
        }

        .timeline-task-date.overdue {
            color: var(--error-color);
            font-weight: 600;
        }

        .timeline-task-title {
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .timeline-task-meta {
            display: flex;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            flex-wrap: wrap;
            align-items: center;
        }

        .timeline-task-tag {
            background: var(--tag-bg);
            color: var(--tag-color);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 40px 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .search-box::after {
            content: "🔍";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        .add-task-form {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: none;
        }

        .add-task-form.active {
            display: block;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .form-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary:hover {
            background: var(--bg-primary);
        }

        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: #666;
            background: #fafafa;
            margin: 20px 0;
        }

        .drop-zone.active {
            border-color: #007acc;
            background: #e3f2fd;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            max-width: 300px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message.success {
            background: #4caf50;
        }

        .message.error {
            background: #f44336;
        }

        .message.info {
            background: #2196f3;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .main-content {
                grid-template-columns: 1fr;
                height: auto;
                gap: 10px;
            }

            .sidebar {
                order: 1;
                padding: 15px;
                max-height: none;
            }

            .sidebar .filter-section:not(:first-child) {
                display: none;
            }

            .sidebar .filter-section.show-mobile {
                display: block;
            }

            .sidebar .filter-section:first-child {
                margin-bottom: 10px;
            }

            .sidebar .filter-section:first-child h3 {
                display: none;
            }

            .mobile-filter-toggle {
                display: block !important;
            }

            .task-area {
                order: 2;
                min-height: 400px;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .stats-bar {
                width: 100%;
                justify-content: space-between;
            }

            .stat-item {
                flex: 1;
                min-width: 60px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="folder-selector">
                    <button id="prevBtn">← Previous</button>
                    <span class="current-folder" id="currentFolder">Select a folder</span>
                    <button id="nextBtn">Next →</button>
                </div>
                <div class="stats-bar">
                    <div class="stat-item">
                        <span>Total:</span>
                        <span class="stat-number" id="totalCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Done:</span>
                        <span class="stat-number" id="doneCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Pending:</span>
                        <span class="stat-number" id="pendingCount">0</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="filter-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                </div>
                <div class="filter-section">
                    <h3>Status</h3>
                    <div class="checkbox-group" id="statusFilter">
                        <label><input type="checkbox" value="pending"> Pending</label>
                        <label><input type="checkbox" value="done"> Done</label>
                        <label><input type="checkbox" value="in-progress"> In Progress</label>
                        <label><input type="checkbox" value="important"> Important</label>
                    </div>
                </div>
                <div class="filter-section">
                    <h3>Tags</h3>
                    <div class="tag-cloud" id="tagCloud"></div>
                </div>
            </aside>

            <div class="task-area">
                <div class="bulk-actions" id="bulkActions">
                    <span class="bulk-actions-info" id="bulkInfo"></span>
                    <div class="bulk-actions-buttons">
                        <button onclick="markSelectedDone()" class="btn-primary">Mark Done</button>
                        <button onclick="deleteSelected()" class="btn-secondary">Delete</button>
                    </div>
                </div>

                <div class="task-header">
                    <h2>Tasks</h2>
                    <div class="task-actions">
                        <button onclick="toggleAddForm()" class="btn-primary">+ Add Task</button>
                        <button onclick="switchView('list')" class="btn-secondary">List</button>
                        <button onclick="switchView('timeline')" class="btn-secondary">Timeline</button>
                    </div>
                </div>

                <div class="add-task-form" id="addTaskForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Task Title</label>
                            <input type="text" id="taskTitle" placeholder="Enter task title">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status</label>
                            <select id="taskStatus">
                                <option value="pending">Pending</option>
                                <option value="in-progress">In Progress</option>
                                <option value="done">Done</option>
                                <option value="important">Important</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" id="taskDueDate">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tags</label>
                            <input type="text" id="taskTags" placeholder="Enter tags separated by commas">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Description</label>
                            <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button onclick="toggleAddForm()" class="btn-secondary">Cancel</button>
                        <button onclick="addTask()" class="btn-primary">Add Task</button>
                    </div>
                </div>

                <div class="task-list" id="taskList">
                    <div class="empty-state">
                        <h3>No tasks found</h3>
                        <p>Click "+ Add Task" to create your first task</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>

    <script>
        // Simple task management system
        let tasks = [];
        let currentView = 'list';

        function showMessage(text, type = 'info') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function toggleAddForm() {
            const form = document.getElementById('addTaskForm');
            form.classList.toggle('active');
        }

        function addTask() {
            const title = document.getElementById('taskTitle').value;
            if (!title) {
                showMessage('Please enter a task title', 'error');
                return;
            }

            const task = {
                id: Date.now(),
                title,
                status: document.getElementById('taskStatus').value,
                dueDate: document.getElementById('taskDueDate').value,
                tags: document.getElementById('taskTags').value.split(',').map(t => t.trim()).filter(t => t),
                description: document.getElementById('taskDescription').value,
                completed: false
            };

            tasks.push(task);
            renderTasks();
            toggleAddForm();
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskStatus').value = 'pending';
            document.getElementById('taskDueDate').value = '';
            document.getElementById('taskTags').value = '';
            document.getElementById('taskDescription').value = '';
            showMessage('Task added successfully', 'success');
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks found</h3>
                        <p>Click "+ Add Task" to create your first task</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => `
                <div class="task-item status-${task.status}">
                    <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} 
                           onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <div class="task-text ${task.completed ? 'status-done' : ''}">${task.title}</div>
                        <div class="task-meta">
                            ${task.tags.map(tag => `<span class="task-tag">${tag}</span>`).join('')}
                            ${task.dueDate ? `<span class="task-due">${task.dueDate}</span>` : ''}
                        </div>
                    </div>
                    <div class="task-item-actions">
                        <button onclick="deleteTask(${task.id})">Delete</button>
                    </div>
                </div>
            `).join('');

            updateStats();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
            showMessage('Task deleted', 'success');
        }

        function updateStats() {
            const total = tasks.length;
            const done = tasks.filter(t => t.completed).length;
            const pending = total - done;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('pendingCount').textContent = pending;
        }

        function switchView(view) {
            currentView = view;
            showMessage(`Switched to ${view} view`, 'info');
        }

        // Initialize
        renderTasks();
    </script>
</body>
</html>
