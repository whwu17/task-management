                    fullContent += '</div>';
                }

                if (note.tasks && note.tasks.length > 0) {
                    fullContent += '<div style="margin-bottom: 20px;">';
                    note.tasks.forEach(function(task) {
                        var icon = getTaskIcon(task.status);
                        fullContent += '<div style="display: flex; align-items: flex-start; gap: 8px; margin: 8px 0;">' +
                            '<span style="font-size: 16px;">' + icon + '</span>' +
                            '<div style="flex: 1;">' +
                            '<div>' + renderTaskText(task.text) + '</div>';

                        if (task.subItems) {
                            fullContent += '<div style="margin-top: 4px; padding-left: 12px; font-size: 13px; color: var(--text-secondary);">';
                            task.subItems.forEach(function(item) {
                                fullContent += '<div style="margin: 2px 0; white-space: pre-wrap;">' + renderTaskText(item) + '</div>';
                            });
                            fullContent += '</div>';
                        }
                        fullContent += '</div></div>';
                    });
                    fullContent += '</div>';
                }

                if (note.body) {
                    fullContent += '<div style="margin-top: 20px;">' + renderMarkdownWithTasks(note.body) + '</div>';
                }

                if (note.tags.length > 0) {
                    fullContent += '<div style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">';
                    note.tags.forEach(function(tag) {
                        var escapedTag = tag.replace(/'/g, "\\'");
                        fullContent += '<a href="#" onclick="event.stopPropagation(); toggleTag(\'' + escapedTag + '\'); backToList(); return false;" style="color: var(--tag-color); text-decoration: none; font-size: 13px;">#' + tag + '</a>';
                    });
                    fullContent += '</div>';
                }
            });

            fullContent += '<div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">' +
                '<button onclick="backToList()" style="padding: 8px 16px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer;">返回列表</button>' +
                '</div>';

            notesList.innerHTML = '<div class="note-item-full" style="max-width: none; cursor: default;">' + fullContent + '</div>';

            notesList.scrollTop = 0;
        }

        // 更新目录树
        function updateDirectoryTree() {
            const container = document.getElementById('directoryTree');

            const tree = {};
            normalNotes.forEach(note => {
                const parts = note.filePath.split('/');
                let current = tree;
                parts.forEach((part, index) => {
                    if (index === parts.length - 1) {
                        if (!current['__files']) current['__files'] = [];
                        current['__files'].push(note);
                    } else {
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }
                });
            });

            function renderTree(node, level = 0, parentKey = '') {
                let html = '';
                const keys = Object.keys(node).sort();
                const isBases = parentKey.toLowerCase() === 'bases' || parentKey.toLowerCase().startsWith('bases/');

                keys.forEach(key => {
                    if (key === '__files') {
                        if (!isBases) {
                            node[key].forEach(note => {
                                const fileName = note.filePath.split('/').pop();
                                const isSelected = selectedNoteFilePath === note.filePath;
                                const indent = level * 12 + 8;
                                html += '<div class="tree-item ' + (isSelected ? 'active' : '') + '" ' +
                                        'style="padding-left: ' + indent + 'px;" ' +
                                        'onclick="showNoteDetail(\'' + note.filePath + '\')">' +
                                        '<span class="tree-icon">📄</span> ' + fileName.replace('.md', '') +
                                        '</div>';
                            });
                        }
                    } else {
                        const indent = level * 12 + 8;
                        const currentPath = parentKey ? parentKey + '/' + key : key;

                        if (parentKey.toLowerCase() === 'bases' || parentKey.toLowerCase().startsWith('bases/')) {
                            // Bases 下的所有子文件夹都显示为合并视图
                            const folderNotes = getNotesInFolder(node[key]);
                            if (folderNotes.length > 0) {
                                html += '<div class="tree-item ' + (selectedNoteFilePath === '__merged__' + currentPath ? 'active' : '') + '" ' +
                                        'style="padding-left: ' + indent + 'px;" ' +
                                        'onclick="showMergedFolderDetail(\'' + currentPath + '\')">' +
                                        '<span class="tree-icon">📚</span> ' + key +
                                        '</div>';
                            }
                        } else {
                            html += '<div class="tree-item tree-folder" ' +
                                    'style="padding-left: ' + indent + 'px;">' +
                                    '<span class="tree-icon">📁</span> ' + key +
                                    '</div>';
                            html += renderTree(node[key], level + 1, currentPath);
                        }
                    }
                });
                return html;
            }

            function getNotesInFolder(node) {
                let notes = [];
                if (node['__files']) {
                    notes = notes.concat(node['__files']);
                }
                Object.keys(node).forEach(key => {
                    if (key !== '__files') {
                        notes = notes.concat(getNotesInFolder(node[key]));
                    }
                });
                return notes;
            }

            container.innerHTML = renderTree(tree);
        }

        // 获取任务图标
        function getTaskIcon(status) {
            const icons = {
                'x': '✅',
                '*': '⭐',
                '-': '❌',
                '!': '❗',
                '/': '🔄',
                'i': 'ℹ️',
                '?': '❓',
                '"': '💬',
                ' ': '⭕'
            };
            return icons[status] || '⭕';
        }

        // 渲染任务文本
        function renderTaskText(text) {
            return text.replace(/#([a-zA-Z0-9/]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
        }

        // Markdown 渲染器
        function renderMarkdownWithTasks(text) {
            if (!text) return '';
            
            let html = text.replace(/```[\s\S]*?```/g, '');
            
            const lines = html.split('\n');
            let result = [];
            let currentTask = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!\/?i])\]\s*(.+)$/);
                
                if (taskMatch) {
                    if (currentTask) {
                        result.push(currentTask.html);
                    }
                    
                    const [_, status, taskText] = taskMatch;
                    const icon = getTaskIcon(status);
                    currentTask = {
                        html: `<div style="display: flex; align-items: flex-start; gap: 8px; margin: 8px 0; padding: 8px 0; border-bottom: 1px solid var(--border-color);">
                            <span style="font-size: 16px; flex-shrink: 0;">${icon}</span>
                            <div style="flex: 1;">${renderTaskText(taskText)}</div>
                        </div>`,
                        subItems: []
                    };
                } else if (currentTask && (line.match(/^(\t|  )/) || line.trim() === '')) {
                    if (line.trim()) {
                        currentTask.subItems.push(line.replace(/^[\t ]+/, ''));
                    }
                } else {
                    if (currentTask) {
                        let taskHtml = currentTask.html;
                        if (currentTask.subItems.length > 0) {
                            taskHtml = taskHtml.replace('</div>', 
                                `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                                    ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                                </div></div>`);
                        }
                        result.push(taskHtml);
                        currentTask = null;
                    }
                    result.push(line);
                }
            }
            
            if (currentTask) {
                let taskHtml = currentTask.html;
                if (currentTask.subItems.length > 0) {
                    taskHtml = taskHtml.replace('</div>', 
                        `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                            ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                        </div></div>`);
                }
                result.push(taskHtml);
            }
            
            html = result.join('\n');
            
            html = html.replace(/^###\s+(.+)$/gm, '<h3 style="font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: var(--text-primary);">$1</h3>');
            html = html.replace(/^##\s+(.+)$/gm, '<h2 style="font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 6px;">$1</h2>');
            html = html.replace(/^#\s+(.+)$/gm, '<h1 style="font-size: 20px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary);">$1</h1>');
            
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 0.9em;">$1</code>');
            html = html.replace(/#([a-zA-Z0-9/_-]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: var(--accent-color); text-decoration: none;">$1</a>');
            html = html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$2</span>');
            html = html.replace(/\[\[([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$1</span>');
            html = html.replace(/^-\s+(.+)$/gm, '<li style="margin: 4px 0; margin-left: 20px;">$1</li>');
            html = html.replace(/(<li[^>]*>.*<\/li>)/s, '<ul style="margin: 8px 0; padding-left: 20px;">$1</ul>');
            html = html.replace(/^>\s*\[!(\w+)\]\s*-?\s*(.*)$/gm, '<div style="background: var(--bg-tertiary); border-left: 3px solid var(--accent-color); padding: 12px; margin: 10px 0; border-radius: 4px;"><span style="font-weight: 600; color: var(--accent-color);">$1</span> $2</div>');
            html = html.replace(/^\[!(\w+)\]\s*-?\s*(.*)$/gm, '<div style="background: var(--bg-tertiary); border-left: 3px solid var(--accent-color); padding: 12px; margin: 10px 0; border-radius: 4px;"><span style="font-weight: 600; color: var(--accent-color);">$1</span> $2</div>');
            html = html.replace(/^>\s+(.+)$/gm, '<blockquote style="border-left: 3px solid var(--accent-color); padding-left: 12px; margin: 10px 0; color: var(--text-secondary);">$1</blockquote>');
            html = html.replace(/^---$/gm, '<hr style="border: none; border-top: 1px solid var(--border-color); margin: 20px 0;">');
            html = html.replace(/\n\n/g, '</p><p style="margin: 10px 0;">');
            html = '<p style="margin: 10px 0;">' + html + '</p>';
            html = html.replace(/<p style="margin: 10px 0;"><\/p>/g, '');
            
            return html;
        }

        // 渲染笔记列表
        function renderNotes() {
            const notesList = document.getElementById('notesList');
            const notesTitle = document.getElementById('notesTitle');
            
            // 如果在Done/Created/Scheduled日历Tab下且有选中日期，显示时间线视图
            if (currentCalendarTab !== 'diary' && selectedDate) {
                renderTimelineView();
                return;
            }
            
            const diaryFiltered = filteredNotes.filter(n => n.isDiary);
            const normalFiltered = filteredNotes.filter(n => !n.isDiary);
            
            if (filteredNotes.length === 0) {
                notesList.innerHTML = `
                    <div class="empty-state">
                        <h3>没有找到笔记</h3>
                        <p>尝试调整搜索或筛选条件</p>
                    </div>
                `;
                notesTitle.textContent = '笔记列表 (0)';
                return;
            }
            
            let html = '';
            
            if (diaryFiltered.length > 0) {
                html += '<div class="notes-section">' +
                        '<h2 class="section-title">📅 日记</h2>';
                
                diaryFiltered.sort((a, b) => {
                    if (!a.date && !b.date) return 0;
                    if (!a.date) return 1;
                    if (!b.date) return -1;
                    return new Date(b.date) - new Date(a.date);
                });
                
                diaryFiltered.forEach(note => {
                    html += renderDiaryNote(note);
                });
                
                html += '</div>';
            }
            
            if (normalFiltered.length > 0) {
                html += '<div class="notes-section">' +
                        '<h2 class="section-title">📄 普通笔记</h2>';
                
                const groupedNotes = {};
                normalFiltered.forEach(note => {
                    const dir = note.filePath.split('/').slice(0, -1).join('/') || '根目录';
                    if (!groupedNotes[dir]) groupedNotes[dir] = [];
                    groupedNotes[dir].push(note);
                });
                
                Object.keys(groupedNotes).sort().forEach(dir => {
                    html += '<div class="note-group">' +
                            '<h3 class="group-title">' + (dir === '根目录' ? '📁 根目录' : '📁 ' + dir) + '</h3>';
                    
                    groupedNotes[dir].forEach(note => {
                        html += renderNormalNote(note);
                    });
                    
                    html += '</div>';
                });
                
                html += '</div>';
            }
            
            notesList.innerHTML = html;
            notesTitle.textContent = `笔记列表 (${filteredNotes.length})`;
        }

        // 渲染时间线视图（用于Done/Created/Scheduled日历）
        function renderTimelineView() {
            const notesList = document.getElementById('notesList');
            const notesTitle = document.getElementById('notesTitle');
            
            let tasks = [];
            let tabTitle = '';
            
            if (currentCalendarTab === 'done') {
                tasks = allTasks.filter(task => task.doneDate && task.doneDate.startsWith(selectedDate));
                tabTitle = 'Done';
            } else if (currentCalendarTab === 'due') {
                tasks = allTasks.filter(task => task.dueDate && task.dueDate.startsWith(selectedDate));
                tabTitle = 'Due';
            } else if (currentCalendarTab === 'scheduled') {
                tasks = allTasks.filter(task => task.scheduledDate && task.scheduledDate.startsWith(selectedDate));
                tabTitle = 'Scheduled';
            }
            
            const dateDisplay = new Date(selectedDate).toLocaleDateString('zh-CN', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
            
            notesTitle.textContent = dateDisplay + ' - ' + tabTitle;
            
            if (tasks.length === 0) {
                notesList.innerHTML = `
                    <div class="empty-state">
                        <h3>没有找到${tabTitle}任务</h3>
                        <p>该日期没有${tabTitle}的任务</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="timeline-container">';
            html += '<div class="timeline-date-group">';
            html += '<div class="timeline-date-header">' + dateDisplay + '</div>';
            html += '<div class="timeline-items">';
            
            tasks.forEach(task => {
                html += '<div class="timeline-item ' + currentCalendarTab + '">';
                html += '<div style="font-size: 14px;">' + renderTaskText(task.text) + '</div>';
                html += '<div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">来源: ' + task.notePath + '</div>';
                if (task.subItems && task.subItems.length > 0) {
                    html += '<div style="margin-top: 8px; padding-left: 12px; font-size: 13px; color: var(--text-secondary);">';
                    task.subItems.forEach(item => {
                        html += '<div style="margin: 2px 0;">' + renderTaskText(item) + '</div>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            
            html += '</div></div></div>';
            
            notesList.innerHTML = html;
        }

        // 渲染日记笔记
        function renderDiaryNote(note) {
            const dateStr = note.date ? new Date(note.date).toLocaleDateString('zh-CN', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            }) : '';
            const isSelected = selectedNoteFilePath === note.filePath;
            
            return `
                <div class="note-item-full ${isSelected ? 'selected' : ''}" 
                     onclick="showNoteDetail('${note.filePath}')"
                     data-date="${note.date || ''}">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-color);">
                        <div style="font-size: 18px; font-weight: 600;">${dateStr}</div>
                        <div style="font-size: 13px; color: var(--text-muted);">
                            ${note.tasks ? note.tasks.length + ' 个任务' : ''}
                        </div>
                    </div>
                    <div style="margin-top: 10px; font-size: 14px; line-height: 1.6;">${renderMarkdownWithTasks(note.body)}</div>
                </div>
            `;
        }

        // 渲染普通笔记
        function renderNormalNote(note) {
            const isSelected = selectedNoteFilePath === note.filePath;
            const fileName = note.filePath.split('/').pop().replace('.md', '');
            
            return `
                <div class="note-item-full ${isSelected ? 'selected' : ''}" 
                     onclick="showNoteDetail('${note.filePath}')">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-color);">
                        <div style="font-size: 18px; font-weight: 600;">${note.title || fileName}</div>
                        <div style="font-size: 13px; color: var(--text-muted);">
                            ${note.tasks ? note.tasks.length + ' 个任务' : ''}
                        </div>
                    </div>
                    ${note.body ? '<div style="margin-top: 10px; font-size: 14px; line-height: 1.6;">' + renderMarkdownWithTasks(note.body) + '</div>' : ''}
                </div>
            `;
        }

        // 筛选笔记
        function filterNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            const checkedStatuses = [];
            document.querySelectorAll('#statusFilter input[type="checkbox"]:checked').forEach(function(cb) {
                checkedStatuses.push(cb.value);
            });
            
            const hasStatusFilter = checkedStatuses.length > 0 && checkedStatuses.length < 9;
            const hasTagFilter = selectedTags.size > 0;
            const hasSearchFilter = searchTerm.length > 0;
            
            // 如果没有任何筛选条件，显示所有笔记
            if (!hasStatusFilter && !hasTagFilter && !hasSearchFilter) {
                filteredNotes = [...allNotes];
            } else {
                // 按任务筛选，只包含匹配任务的笔记
                filteredNotes = allNotes.filter(function(note) {
                    let hasMatchingTask = false;
                    
                    if (note.tasks) {
                        note.tasks.forEach(function(task) {
                            let taskMatches = true;
                            
                            // 搜索筛选
                            if (hasSearchFilter) {
                                const searchInTask = task.text.toLowerCase().includes(searchTerm);
                                const searchInSubItems = task.subItems && task.subItems.some(function(sub) { 
                                    return sub.toLowerCase().includes(searchTerm); 
                                });
                                if (!searchInTask && !searchInSubItems) {
                                    taskMatches = false;
                                }
                            }
                            
                            // 状态筛选
                            if (taskMatches && hasStatusFilter) {
                                if (checkedStatuses.indexOf(task.status) === -1) {
                                    taskMatches = false;
                                }
                            }
                            
                            // 标签筛选
                            if (taskMatches && hasTagFilter) {
                                let taskHasMatchingTag = false;
                                const taskText = task.text || '';
                                const subItems = task.subItems || [];
                                
                                for (const selectedTag of selectedTags) {
                                    const tagPattern = '#' + selectedTag.replace(/\//g, '\\/');
                                    const regex = new RegExp(tagPattern + '(?=\\/|\\s|$|,)', 'g');
                                    
                                    if (regex.test(taskText)) {
                                        taskHasMatchingTag = true;
                                        break;
                                    }
                                    for (let j = 0; j < subItems.length; j++) {
                                        if (regex.test(subItems[j])) {
                                            taskHasMatchingTag = true;
                                            break;
                                        }
                                    }
                                }
                                
                                if (!taskHasMatchingTag) {
                                    taskMatches = false;
                                }
                            }
                            
                            if (taskMatches) {
                                hasMatchingTask = true;
                            }
                        });
                    }
                    
                    return hasMatchingTask;
                });
            }
            
            renderNotes();
            updateStats();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalNotes').textContent = allNotes.length;
            document.getElementById('filteredNotes').textContent = filteredNotes.length;
        }

        // 更新标签云
        function updateTagCloud() {
            var tagCount = {};
            
            allNotes.forEach(function(note) {
                if (note.tasks) {
                    note.tasks.forEach(function(task) {
                        var tagMatches = task.text.match(/#([a-zA-Z0-9\/]+)/g) || [];
                        tagMatches.forEach(function(tag) {
                            var tagName = tag.substring(1);
                            tagCount[tagName] = (tagCount[tagName] || 0) + 1;
                        });
                        
                        if (task.subItems) {
                            task.subItems.forEach(function(subItem) {
                                var subMatches = subItem.match(/#([a-zA-Z0-9\/]+)/g) || [];
                                subMatches.forEach(function(tag) {
                                    var tagName = tag.substring(1);
                                    tagCount[tagName] = (tagCount[tagName] || 0) + 1;
                                });
                            });
                        }
                    });
                }
            });
            
            var tagCloud = document.getElementById('tagCloud');
            var allTags = Object.keys(tagCount).sort();
            
            var allActive = selectedTags.size === 0;
            var html = '<div class="tag-pill ' + (allActive ? 'active' : '') + '" onclick="clearAllTags()" style="margin-bottom: 8px; cursor: pointer;">全部</div>';
            
            var tagHierarchy = {};
            allTags.forEach(function(tag) {
                var parts = tag.split('/');
                var current = tagHierarchy;
                for (var i = 0; i < parts.length; i++) {
                    var path = parts.slice(0, i + 1).join('/');
                    if (!current[path]) {
                        current[path] = { count: 0, children: {} };
                    }
                    if (i === parts.length - 1) {
                        current[path].count = tagCount[tag];
                    }
                    current = current[path].children;
                }
            });
            
            function renderTagTree(node, level) {
                level = level || 0;
                var html = '';
                var keys = Object.keys(node).sort();
                keys.forEach(function(tag) {
                    var data = node[tag];
                    var isActive = selectedTags.has(tag);
                    var hasChildren = Object.keys(data.children).length > 0;
                    var marginLeft = level * 16;
var countStr = data.count > 0 ? '(' + data.count + ')' : '';
                    
                    html += '<div class="tag-pill ' + (isActive ? 'active' : '') + '" ' +
                            'onclick="toggleTag(\'' + tag.replace(/'/g, "\\'") + '\')" ' +
                            'style="margin-left: ' + marginLeft + 'px; margin-bottom: 2px; display: block; cursor: pointer; text-align: left;">' +
                            tag + ' ' + countStr + '</div>';
                    
                    if (hasChildren) {
                        html += renderTagTree(data.children, level + 1);
                    }
                });
                return html;
            }
            
            html += renderTagTree(tagHierarchy);
            tagCloud.innerHTML = html;
        }

        // 切换标签
        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            updateTagCloud();
            filterNotes();
        }

        // 清除所有标签
        function clearAllTags() {
            selectedTags.clear();
            updateTagCloud();
            filterNotes();
        }

        // 刷新笔记（带防抖）
        async function refreshNotes() {
            if (isRefreshing) {
                console.log('Already refreshing, skipping duplicate call');
                return;
            }
            
            if (directoryHandle) {
                if (directoryHandle.isSafari) {
                    await handleSafariFiles(directoryHandle.files);
                } else {
                    await loadNotes(true);
                }
            } else {
                showMessage('请先选择文件夹', 'error');
            }
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            const existing = document.querySelector('.message');
if (existing) existing.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = message;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        // 切换暗黑模式
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // 暴露函数到全局作用域
        window.selectFolder = selectFolder;
        window.toggleDarkMode = toggleDarkMode;
        window.refreshNotes = refreshNotes;
        window.prevMonth = prevMonth;
        window.nextMonth = nextMonth;
        window.selectDate = selectDate;
        window.showNoteDetail = showNoteDetail;
        window.showMergedFolderDetail = showMergedFolderDetail;
        window.backToList = backToList;
        window.toggleTag = toggleTag;
        window.clearAllTags = clearAllTags;
        window.filterNotes = filterNotes;
        window.handleSafariFiles = handleSafariFiles;
        window.switchCalendarTab = switchCalendarTab;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
            
            if (!isFileSystemAccessSupported()) {
                document.getElementById('browserWarning').style.display = 'block';
                console.log('Safari/Firefox 兼容模式已启用');
            }
        });
    </script>
</body>
</html>
