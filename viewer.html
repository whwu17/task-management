<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent-color: #4a90e2;
            --border-color: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
            --tag-bg: #e3f2fd;
            --tag-color: #1976d2;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3d3d3d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent-color: #64b5f6;
            --border-color: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
            --tag-bg: #1565c0;
            --tag-color: #bbdefb;
            --success-color: #81c784;
            --warning-color: #ffb74d;
            --danger-color: #e57373;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: 260px 240px 1fr;
            gap: 0;
            height: 100vh;
        }

        .sidebar {
            background: var(--bg-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            height: 100vh;
        }

        .sidebar h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .sidebar-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .calendar-title {
            font-size: 14px;
            font-weight: 600;
        }

        .calendar-nav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background: var(--bg-tertiary);
        }

        .calendar-day.has-note {
            background: var(--tag-bg);
            color: var(--tag-color);
            font-weight: 600;
        }

        .calendar-day.type-work {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: 600;
        }

        .calendar-day.type-life {
            background: #f3e5f5;
            color: #7b1fa2;
            font-weight: 600;
        }

        .calendar-day.type-study {
            background: #e8f5e9;
            color: #388e3c;
            font-weight: 600;
        }

        .calendar-day.type-health {
            background: #fff3e0;
            color: #f57c00;
            font-weight: 600;
        }

        .calendar-day.type-entertainment {
            background: #fce4ec;
            color: #c2185b;
            font-weight: 600;
        }

        .calendar-day.type-travel {
            background: #e0f7fa;
            color: #0097a7;
            font-weight: 600;
        }

        .calendar-day.type-default {
            background: var(--tag-bg);
            color: var(--tag-color);
            font-weight: 600;
        }

        .calendar-day.today {
            border: 2px solid var(--accent-color);
        }

        .calendar-day.empty {
            cursor: default;
        }

        .calendar-day.other-month {
            color: var(--text-muted);
        }

        .directory-tree {
            font-size: 13px;
        }

        .tree-item {
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background-color 0.2s;
        }

        .tree-item:hover {
            background: var(--bg-tertiary);
        }

        .tree-item.active {
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .tree-folder {
            font-weight: 600;
            margin-top: 8px;
        }

        .tree-file {
            padding-left: 20px;
        }

        .tree-icon {
            font-size: 12px;
        }

        .notes-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent-color);
        }

        .note-group {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .group-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .note-item-full.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent-color);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-pill {
            padding: 4px 10px;
            background: transparent;
            color: var(--tag-color);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            display: inline-block;
            margin: 2px;
        }

        .tag-pill:hover {
            background: var(--tag-bg);
            border-color: var(--tag-color);
        }

        .tag-pill.active {
            background: var(--tag-bg);
            border-color: var(--tag-color);
            font-weight: 600;
        }

        .tag-pill::before {
            content: '#';
            opacity: 0.6;
            margin-right: 1px;
        }

        .status-filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-filter-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .status-filter-group label:hover {
            background: var(--bg-tertiary);
        }

        .status-filter-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .task-icon {
            font-size: 14px;
        }

        .notes-area {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
        }

        .notes-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .notes-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .notes-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #357abd;
            transform: translateY(-1px);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .note-item-full {
            background: var(--bg-secondary);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .note-item-full:last-child {
            border-bottom: none;
        }

        .note-item-full:hover {
            background: var(--bg-tertiary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success { background: var(--success-color); }
        .message.error { background: var(--danger-color); }
        .message.info { background: var(--accent-color); }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .sidebar {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第一栏：过滤和设置 -->
        <aside class="sidebar">
            <h1>📚 笔记</h1>
            
            <div class="sidebar-section">
                <h3>统计</h3>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalNotes">0</div>
                        <div class="stat-label">总笔记</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="filteredNotes">0</div>
                        <div class="stat-label">已筛选</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>搜索</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="filterNotes()">
                </div>
            </div>

            <div class="sidebar-section">
                <h3>标签筛选</h3>
                <div class="tag-cloud" id="tagCloud">
                    <!-- 标签动态生成 -->
                </div>
            </div>

            <div class="sidebar-section">
                <h3>状态筛选</h3>
                <div class="status-filter-group" id="statusFilter">
                    <label><input type="checkbox" value="i" checked onchange="filterNotes()"> <span class="task-icon">ℹ️</span> 信息 [i]</label>
                    <label><input type="checkbox" value="?" checked onchange="filterNotes()"> <span class="task-icon">❓</span> 疑问 [?]</label>
                    <label><input type="checkbox" value=" " checked onchange="filterNotes()"> <span class="task-icon">⭕</span> 待办 [ ]</label>
                    <label><input type="checkbox" value="*" checked onchange="filterNotes()"> <span class="task-icon">⭐</span> 星标 [*]</label>
                    <label><input type="checkbox" value="x" checked onchange="filterNotes()"> <span class="task-icon">✅</span> 完成 [x]</label>
                    <label><input type="checkbox" value="-" checked onchange="filterNotes()"> <span class="task-icon">❌</span> 取消 [-]</label>
                    <label><input type="checkbox" value="!" checked onchange="filterNotes()"> <span class="task-icon">🔴</span> 重要 [!]</label>
                    <label><input type="checkbox" value="/" checked onchange="filterNotes()"> <span class="task-icon">🔄</span> 进行中 [/]</label>
                    <label><input type="checkbox" value="&quot;" checked onchange="filterNotes()"> <span class="task-icon">💬</span> 引用 ["]</label>
                </div>
            </div>

            <div class="sidebar-section">
                <button onclick="selectFolder()" style="width: 100%; margin-bottom: 8px;">选择文件夹</button>
                <button onclick="toggleDarkMode()" id="darkModeToggle" style="width: 100%;">切换主题</button>
                
                <div id="browserWarning" style="display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 12px; color: #856404;">
                    ⚠️ 浏览器不支持现代API
                </div>
            </div>
        </aside>

        <!-- 第二栏：日历和目录树 -->
        <aside class="sidebar" style="border-right: 1px solid var(--border-color);">
            <div class="sidebar-section">
                <h3>日记日历</h3>
                <div id="calendarContainer">
                    <!-- 日历将动态生成 -->
                </div>
            </div>

            <div class="sidebar-section" style="flex: 1; overflow-y: auto;">
                <h3>目录</h3>
                <div class="directory-tree" id="directoryTree">
                    <!-- 目录树将动态生成 -->
                </div>
            </div>
        </aside>

        <!-- 第三栏：笔记内容 -->
        <main class="notes-area">
            <div class="notes-header">
                <h2 id="notesTitle">笔记列表</h2>
                <div class="notes-actions">
                    <button onclick="refreshNotes()">刷新</button>
                </div>
            </div>
            
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <h3>请选择文件夹开始</h3>
                    <p>点击"选择文件夹"按钮加载您的笔记</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 隐藏的文件输入用于 Safari -->
    <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" onchange="handleSafariFiles(this.files)">

    <script>
        let allNotes = [];
        let filteredNotes = [];
        let diaryNotes = [];
        let normalNotes = [];
        let selectedTags = new Set();
        let selectedStatuses = new Set();
        let directoryHandle = null;
        let currentMonth = new Date();
        let selectedDate = null;
        let selectedNoteFilePath = null;

        // 检测浏览器支持
        function isFileSystemAccessSupported() {
            return 'showDirectoryPicker' in window;
        }

        // 验证并请求目录权限
        async function verifyPermission(dirHandle, isRefresh = false) {
            try {
                // 如果是刷新操作，先尝试直接访问
                if (isRefresh && dirHandle.queryPermission) {
                    const currentState = await dirHandle.queryPermission({ mode: 'read' });
                    if (currentState === 'granted') {
                        return true;
                    }
                }
                
                // 请求权限
                if (dirHandle.requestPermission) {
                    const result = await dirHandle.requestPermission({ mode: 'read' });
                    if (result === 'granted') {
                        return true;
                    }
                    throw new Error('没有权限访问该文件夹');
                }
                // 如果不支持 requestPermission，尝试直接访问
                return true;
            } catch (err) {
                console.log('Permission check:', err);
                return true; // 继续尝试
            }
        }

        // 选择文件夹
        async function selectFolder() {
            console.log('selectFolder called, FileSystemAccess supported:', isFileSystemAccessSupported());
            
            if (isFileSystemAccessSupported()) {
                // Chrome/Edge 现代方式
                try {
                    console.log('Opening directory picker...');
                    directoryHandle = await window.showDirectoryPicker();
                    console.log('Directory selected:', directoryHandle.name);
                    await loadNotes();
                } catch (error) {
                    console.error('Directory picker error:', error.name, error.message);
                    if (error.name !== 'AbortError') {
                        showMessage('选择文件夹失败: ' + error.message, 'error');
                    }
                }
            } else {
                // Safari 兼容方式
                console.log('Using Safari fallback');
                document.getElementById('folderInput').click();
            }
        }

        // Safari 文件处理
        async function handleSafariFiles(files) {
            if (!files || files.length === 0) return;
            
            // 设置虚拟的 directoryHandle 以便刷新功能工作
            directoryHandle = {
                name: files[0].webkitRelativePath.split('/')[0] || 'Selected Folder',
                isSafari: true,
                files: files
            };
            
            showMessage('正在加载笔记...', 'info');
            allNotes = [];
            diaryNotes = [];
            normalNotes = [];
            
            try {
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const content = await file.text();
                        const path = file.webkitRelativePath || file.name;
                        // 检查是否在 Diary 目录下
                        const isInDiaryFolder = path.includes('/Diary/') || path.includes('/diary/');
                        const note = parseNote(content, path, isInDiaryFolder);
                        if (note) {
                            allNotes.push(note);
                            if (note.isDiary) {
                                diaryNotes.push(note);
                            } else {
                                normalNotes.push(note);
                            }
                        }
                    }
                }
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                updateCalendar();
                updateDirectoryTree();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            }
        }

        // 加载笔记
        async function loadNotes(isRefresh = false) {
            showMessage('正在加载笔记...', 'info');
            
            try {
                if (!directoryHandle) {
                    throw new Error('请先选择文件夹');
                }
                
                // 验证权限
                await verifyPermission(directoryHandle, isRefresh);
                
                allNotes = [];
                diaryNotes = [];
                normalNotes = [];
                await processDirectory(directoryHandle);
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                updateCalendar();
                updateDirectoryTree();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            }
        }

        // 递归处理目录
        async function processDirectory(dirHandle, path = '', isInDiaryFolder = false) {
            for await (const entry of dirHandle.values()) {
                const entryPath = path ? `${path}/${entry.name}` : entry.name;
                
                // 检测是否是 Diary 文件夹
                const isDiaryFolder = entry.name === 'Diary' || entry.name === 'diary' || isInDiaryFolder;
                
                if (entry.kind === 'directory') {
                    const subDirHandle = await dirHandle.getDirectoryHandle(entry.name);
                    await processDirectory(subDirHandle, entryPath, isDiaryFolder);
                } else if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                    try {
                        const file = await entry.getFile();
                        const content = await file.text();
                        const note = parseNote(content, entryPath, isDiaryFolder);
                        if (note) {
                            allNotes.push(note);
                            if (note.isDiary) {
                                diaryNotes.push(note);
                            } else {
                                normalNotes.push(note);
                            }
                        }
                    } catch (error) {
                        console.warn(`无法读取文件 ${entryPath}:`, error);
                    }
                }
            }
        }

        // 解析笔记
        function parseNote(content, filePath, forceDiary = false) {
            const lines = content.split('\n');
            let frontmatter = {};
            let bodyStart = 0;
            
            // 解析 YAML frontmatter
            if (lines[0] === '---') {
                let i = 1;
                while (i < lines.length && lines[i] !== '---') {
                    const line = lines[i].trim();
                    if (line) {
                        const colonIndex = line.indexOf(':');
                        if (colonIndex > 0) {
                            const key = line.substring(0, colonIndex).trim();
                            const value = line.substring(colonIndex + 1).trim();
                            
                            if (value.startsWith('-')) {
                                // 数组格式
                                const array = [];
                                let j = i;
                                while (j < lines.length && lines[j] !== '---') {
                                    const arrayLine = lines[j].trim();
                                    if (arrayLine.startsWith('-')) {
                                        const item = arrayLine.substring(1).trim().replace(/^["']|["']$/g, '');
                                        if (item) array.push(item);
                                    } else if (arrayLine === '' || arrayLine.startsWith(' ')) {
                                        // 多行数组的续行
                                        const item = arrayLine.replace(/^["']|["']$/g, '').trim();
                                        if (item) {
                                            if (array.length > 0) {
                                                array[array.length - 1] += ' ' + item;
                                            }
                                        }
                                    } else {
                                        break;
                                    }
                                    j++;
                                }
                                frontmatter[key] = array;
                                i = j - 1;
                            } else {
                                // 简单键值对
                                frontmatter[key] = value.replace(/^["']|["']$/g, '');
                            }
                        }
                    }
                    i++;
                }
                if (i < lines.length && lines[i] === '---') {
                    bodyStart = i + 1;
                }
            }
            
            // 提取日期从文件路径（支持 2024/01-15.md 或 2024/01/15.md 格式）
            let date = null;
            let isDiary = forceDiary;
            const dateMatch = filePath.match(/(\d{4})[\/-](\d{2})[\/-](\d{2})/);
            if (dateMatch) {
                date = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
                // 如果文件名是日期格式，也视为日记
                if (!isDiary && filePath.match(/\d{4}[\/-]\d{2}[\/-]\d{2}/)) {
                    isDiary = true;
                }
            }
            
            // 提取任务
            const tasks = [];
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!/\?"i])\]\s*(.+)$/);
                if (taskMatch) {
                    const status = taskMatch[1];
                    const text = taskMatch[2];
                    
                    // 提取子项
                    const subItems = [];
                    let j = i + 1;
                    while (j < lines.length) {
                        const subLine = lines[j];
                        if (subLine.match(/^(\t|  )/)) {
                            subItems.push(subLine.replace(/^[\t ]+/, '').trim());
                            j++;
                        } else {
                            break;
                        }
                    }
                    
                    tasks.push({
                        status,
                        text,
                        subItems: subItems.length > 0 ? subItems : null
                    });
                }
            }
            
            // 提取标题
            let title;
            if (isDiary && date) {
                // 日记文件：标题就是日期
                title = date;
            } else {
                // 普通文件：从文件名或第一个 # 标题获取
                title = filePath.split('/').pop().replace('.md', '');
                for (let i = bodyStart; i < lines.length; i++) {
                    const headerMatch = lines[i].match(/^#\s+(.+)$/);
                    if (headerMatch) {
                        title = headerMatch[1].trim();
                        break;
                    }
                }
            }
            
            // 收集所有 frontmatter 作为 meta tags
            const metaTags = [];
            for (const [key, value] of Object.entries(frontmatter)) {
                if (key !== 'tags' && value) {
                    metaTags.push({ key, value });
                }
            }
            
            // 提取完整正文内容（排除 frontmatter、代码块、Done/Scheduled/Pending 区域）
            let bodyContent = [];
            let inCodeBlock = false;
            let inDoneSection = false;
            let inScheduledSection = false;
            let inPendingSection = false;
            
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                
                // 检查是否进入 Done 部分
                if (line.match(/^##?\s*Done\s*$/i)) {
                    inDoneSection = true;
                    inScheduledSection = false;
                    inPendingSection = false;
                    continue;
                }
                
                // 检查是否进入 Scheduled 部分
                if (line.match(/^##?\s*Scheduled\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = true;
                    inPendingSection = false;
                    continue;
                }
                
                // 检查是否进入 Pending 部分
                if (line.match(/^##?\s*Pending\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = false;
                    inPendingSection = true;
                    continue;
                }
                
                // 如果在 Done/Scheduled/Pending 区域，跳过
                if (inDoneSection || inScheduledSection || inPendingSection) {
                    // 检查是否是新的同级或上级标题（## 或 # 开头）
                    if (line.match(/^#{1,2}\s+[^#]/)) {
                        inDoneSection = false;
                        inScheduledSection = false;
                        inPendingSection = false;
                    } else {
                        continue;
                    }
                }
                
                // 跳过代码块标记
                if (line.startsWith('```')) {
                    inCodeBlock = !inCodeBlock;
                    continue;
                }
                // 在代码块内，跳过
                if (inCodeBlock) {
                    continue;
                }
                
                // 保留所有内容（包括任务行）
                bodyContent.push(line);
            }
            
            // 解析标签 - 支持YAML数组和逗号分隔字符串
            let tags = [];
            if (frontmatter.tags) {
                console.log(`Frontmatter tags for ${filePath}:`, frontmatter.tags, typeof frontmatter.tags);
                if (Array.isArray(frontmatter.tags)) {
                    tags = frontmatter.tags.map(t => t.trim());
                    console.log(`Parsed tags from array:`, tags);
                } else if (typeof frontmatter.tags === 'string') {
                    tags = frontmatter.tags.split(',').map(t => t.trim());
                    console.log(`Parsed tags from string:`, tags);
                }
            } else {
                console.log(`No tags found in frontmatter for ${filePath}. Frontmatter:`, frontmatter);
            }

            console.log(`Final parsed tags for ${filePath}:`, tags);

            return {
                title,
                filePath,
                date,
                isDiary,
                tasks,
                tags,
                metaTags,
                body: bodyContent.join('\n').trim()
            };
        }

        // 渲染笔记列表
        function renderNotes() {
            const notesList = document.getElementById('notesList');
            const notesTitle = document.getElementById('notesTitle');
            
            // 分离日记和普通笔记
            const diaryFiltered = filteredNotes.filter(n => n.isDiary);

            if (filteredNotes.length === 0) {
                notesList.innerHTML = `

                    </div>

            let html = '';
            
            // 日记部分

                html += '<div class="notes-section">' +

                // 按日期排序（倒序，最新的在前）
                diaryFiltered.sort((a, b) => {
                    if (!a.date && !b.date) return 0;
                    if (!a.date) return 1;
                    if (!b.date) return -1;
                    return new Date(b.date) - new Date(a.date);
                });

                    html += renderDiaryNote(note);
                });
                
                html += '</div>';
            }
            
            // 普通笔记部分
            if (normalFiltered.length > 0) {
                html += '<div class="notes-section">' +
                        '<h2 class="section-title">📄 普通笔记</h2>';
                
                // 按文件路径分组显示
                const groupedNotes = {};
                normalFiltered.forEach(note => {
                    const dir = note.filePath.split('/').slice(0, -1).join('/') || '根目录';
                    if (!groupedNotes[dir]) groupedNotes[dir] = [];

            notesList.innerHTML = html;
            notesTitle.textContent = `笔记列表 (${filteredNotes.length})`;

        // 获取日期的主要类型标签
        function getDiaryTypeForDate(dateStr) {
            const notes = diaryNotes.filter(note => note.date && note.date.startsWith(dateStr));
            const typeCount = {};
            let maxType = '';
            let maxCount = 0;

            console.log(`Checking date ${dateStr}, notes:`, notes);

            notes.forEach(note => {
                console.log(`Note ${note.filePath} tags:`, note.tags);
                
                // 检查 frontmatter 中的标签
                note.tags.forEach(tag => {
                    if (tag.startsWith('type/')) {
                        const type = tag.split('/')[1];
                        typeCount[type] = (typeCount[type] || 0) + 1;
                        if (typeCount[type] > maxCount) {
                            maxCount = typeCount[type];
                            maxType = type;
                        }
                        console.log(`Found type tag in frontmatter: ${tag} -> type: ${type}`);
                    }
                });
                
                // 检查任务文本中的标签
                if (note.tasks) {
                    note.tasks.forEach(task => {
                        const tagMatches = task.text.match(/#([a-zA-Z0-9\/]+)/g) || [];
                        tagMatches.forEach(tag => {
                            if (tag.startsWith('#type/')) {
                                const type = tag.split('/')[2]; // #type/xxx -> xxx
                                typeCount[type] = (typeCount[type] || 0) + 1;
                                if (typeCount[type] > maxCount) {
                                    maxCount = typeCount[type];
                                    maxType = type;
                                }
                                console.log(`Found type tag in task: ${tag} -> type: ${type}`);
                            }
                        });
                        
                        // 检查子项中的标签
                        if (task.subItems) {
                            task.subItems.forEach(subItem => {
                                const subTagMatches = subItem.match(/#([a-zA-Z0-9\/]+)/g) || [];
                                subTagMatches.forEach(tag => {
                                    if (tag.startsWith('#type/')) {
                                        const type = tag.split('/')[2];
                                        typeCount[type] = (typeCount[type] || 0) + 1;
                                        if (typeCount[type] > maxCount) {
                                            maxCount = typeCount[type];
                                            maxType = type;
                                        }
                                        console.log(`Found type tag in subtask: ${tag} -> type: ${type}`);
                                    }
                                });
                            });
                        }
                    });
                }
            });

            console.log(`Type counts for ${dateStr}:`, typeCount, `Max type: ${maxType}`);
            return maxType;
        }

        // 更新日历
        function updateCalendar() {
            const container = document.getElementById('calendarContainer');
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();

            // 获取该月有笔记的日期及其类型
            const diaryDates = {};
            const diaryTypes = {};
            diaryNotes.forEach(note => {
                if (note.date) {
                    const d = note.date.substring(0, 10); // YYYY-MM-DD
                    diaryDates[d] = true;
                    // 只计算一次类型
                    if (!diaryTypes[d]) {
                        diaryTypes[d] = getDiaryTypeForDate(d);
                    }
                }
            });
            
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                               '七月', '八月', '九月', '十月', '十一月', '十二月'];
            
            let html = '<div class="calendar-header">';
            html += '<button class="calendar-nav" onclick="prevMonth()">◀</button>';
            html += '<span class="calendar-title">' + year + '年 ' + monthNames[month] + '</span>';
            html += '<button class="calendar-nav" onclick="nextMonth()">▶</button>';
            html += '</div>';
            
            html += '<div class="calendar-weekdays">';
            ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
                html += '<div>' + d + '</div>';
            });
            html += '</div>';
            
            html += '<div class="calendar-days">';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const today = new Date();
            const todayStr = today.toISOString().substring(0, 10);
            
            // 上个月的天数
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += '<div class="calendar-day empty other-month">' + day + '</div>';
            }
            
            // 本月的天数
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                const hasNote = diaryDates[dateStr];
                const isToday = dateStr === todayStr;
                const isSelected = selectedDate === dateStr;
                const diaryType = diaryTypes[dateStr];

                let classes = 'calendar-day';
                if (hasNote) {
                    if (diaryType && diaryType.trim()) {
                        const typeClass = 'type-' + diaryType.toLowerCase().replace(/[^a-z0-9]/g, '-');
                        classes += ' ' + typeClass;
                        console.log(`Date ${dateStr}: adding class ${typeClass} for type ${diaryType}`);
                    } else {
                        classes += ' has-note';
                        console.log(`Date ${dateStr}: no type found, using default`);
                    }
                }
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';

                html += '<div class="' + classes + '" onclick="selectDate(\'' + dateStr + '\')">' + day + '</div>';
            }
            
            // 下个月的天数
            const totalCells = firstDay + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                html += '<div class="calendar-day empty other-month">' + i + '</div>';
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        // 上个月
        function prevMonth() {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            updateCalendar();
        }

        // 下个月
        function nextMonth() {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            updateCalendar();
        }

// 选择日期 - 滚动到该日期的日记
        function selectDate(dateStr) {
            selectedDate = selectedDate === dateStr ? null : dateStr;
            updateCalendar();
            
            // 筛选该日期的日记
            if (selectedDate) {
                filteredNotes = allNotes.filter(function(note) {
                    if (!note.isDiary) return true;
                    return note.date && note.date.startsWith(selectedDate);
                });
            } else {
                filteredNotes = [].concat(allNotes);
            }
            
            filterNotes();
            renderNotes();
            
            // 滚动到该日期的日记（延迟确保DOM已渲染）
            if (selectedDate) {
                setTimeout(function() {
                    var target = document.querySelector('[data-date^="' + selectedDate + '"]');
                    if (target) {
                        smoothScrollTo(target);
                    }
                }, 100);
            }
        }

        // 平滑滚动（渐进式）
        function smoothScrollTo(target) {
            var notesList = document.getElementById('notesList');
            if (!notesList) return;
            
            var startY = notesList.scrollTop;
            var targetY = target.offsetTop - notesList.offsetTop - 20;
            var distance = targetY - startY;
            var distanceAbs = Math.abs(distance);
            var duration = Math.min(500, Math.max(200, distanceAbs / 2)); // 根据距离调整时长
            var startTime = null;
            
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                var elapsed = timestamp - startTime;
                var progress = Math.min(elapsed / duration, 1);
                
                // 缓动函数
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                notesList.scrollTop = startY + distance * easeProgress;
                
                if (elapsed < duration) {
                    requestAnimationFrame(step);
                }
            }
            
            requestAnimationFrame(step);
        }

                    note.tags.forEach(function(tag) {
                        var escapedTag = tag.replace(/'/g, "\\'");
                        fullContent += '<a href="#" onclick="event.stopPropagation(); toggleTag(\'' + escapedTag + '\'); backToList(); return false;" style="color: var(--tag-color); text-decoration: none; font-size: 13px;">#' + tag + '</a>';
                    });
                    fullContent += '</div>';
                }
            });

            // 添加返回按钮
            fullContent += '<div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">' +
                '<button onclick="backToList()" style="padding: 8px 16px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer;">返回列表</button>' +
                '</div>';

            notesList.innerHTML = '<div class="note-item-full" style="max-width: none; cursor: default;">' + fullContent + '</div>';

            // 滚动到顶部
            notesList.scrollTop = 0;
        }

        // 更新目录树
        function updateDirectoryTree() {
            const container = document.getElementById('directoryTree');

            // 构建目录结构
            const tree = {};
            normalNotes.forEach(note => {
                const parts = note.filePath.split('/');
                let current = tree;
                parts.forEach((part, index) => {
                    if (index === parts.length - 1) {
                        // 文件
                        if (!current['__files']) current['__files'] = [];
                        current['__files'].push(note);
                    } else {
                        // 目录
                        if (!current[part]) current[part] = {};
                        current = current[part];
                    }
                });
            });

            function renderTree(node, level = 0, parentKey = '') {
                let html = '';
                const keys = Object.keys(node).sort();

                // 检查是否是 Bases 文件夹
                const isBases = parentKey.toLowerCase() === 'bases' || parentKey.toLowerCase().startsWith('bases/');

                keys.forEach(key => {
                    if (key === '__files') {
                        // 渲染文件
                        // 在 Bases 子文件夹中，不单独显示文件
                        if (!isBases) {
                            node[key].forEach(note => {
                                const fileName = note.filePath.split('/').pop();
                                const isSelected = selectedNoteFilePath === note.filePath;
                                const indent = level * 12 + 8;
                                html += '<div class="tree-item" ' +
                                        'style="padding-left: ' + indent + 'px;" ' +
                                        'onclick="showNoteDetail(\'' + note.filePath + '\')">' +
                                        '<span class="tree-icon">📄</span> ' + fileName.replace('.md', '') +
                                        '</div>';
                            });
                        }
                    } else {
                        // 渲染目录
                        const indent = level * 12 + 8;
                        const currentPath = parentKey ? parentKey + '/' + key : key;

                        // 检查是否是 Bases 文件夹下的子文件夹（Bases的直接子文件夹）
                        if (parentKey.toLowerCase() === 'bases') {
                            // 在 Bases 下，显示合并视图按钮
                            const folderNotes = getNotesInFolder(node[key]);
                            if (folderNotes.length > 0) {
                                html += '<div class="tree-item" ' +
                                        'style="padding-left: ' + indent + 'px;" ' +
                                        'onclick="showMergedFolderDetail(\'' + currentPath + '\')">' +
                                        '<span class="tree-icon">📚</span> ' + key +
                                        '</div>';
                            }
                        } else {
                            // 普通文件夹或Bases的深层子文件夹
                            html += '<div class="tree-item tree-folder" ' +
                                    'style="padding-left: ' + indent + 'px;">' +
                                    '<span class="tree-icon">📁</span> ' + key +
                                    '</div>';
                            html += renderTree(node[key], level + 1, currentPath);
                        }
                    }
                });
                return html;
            }

            // 辅助函数：获取文件夹中的所有笔记
            function getNotesInFolder(node) {
                let notes = [];
                if (node['__files']) {
                    notes = notes.concat(node['__files']);
                }
                Object.keys(node).forEach(key => {
                    if (key !== '__files') {
                        notes = notes.concat(getNotesInFolder(node[key]));
                    }
                });
                return notes;
            }

            container.innerHTML = renderTree(tree);
        }

        // 渲染笔记卡片
        function renderNoteCard(note) {
            const dateStr = note.date ? new Date(note.date).toLocaleDateString('zh-CN') : '';
            
            // 渲染 YAML meta tags
            let metaHtml = '';
            if (note.metaTags && note.metaTags.length > 0) {
                metaHtml = `<div style="margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px;">
                    ${note.metaTags.map(meta => `
                        <span style="color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;">
                            ${meta.key}: <span style="color: var(--text-secondary);">${meta.value}</span>
                        </span>
                    `).join('')}
                </div>`;
            }
            
            // 渲染完整内容（包括任务）
            let bodyHtml = '';
            if (note.body) {
                bodyHtml = `<div style="margin-top: 10px; font-size: 14px; line-height: 1.6;">${renderMarkdownWithTasks(note.body)}</div>`;
            }
            
            // 渲染标签（Obsidian 风格）
            let tagsHtml = '';
            if (note.tags.length > 0) {
                tagsHtml = `<div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                    ${note.tags.map(tag => `<a href="#" onclick="event.stopPropagation(); toggleTag('${tag}'); return false;" style="color: var(--tag-color); text-decoration: none; font-size: 13px;">#${tag}</a>`).join('')}
                </div>`;
            }
            
            return `
                <div class="note-item-full" onclick="showNoteDetail('${note.filePath}')">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-color);">
                        <div style="font-size: 18px; font-weight: 600;">${note.title}</div>
                        <div style="font-size: 13px; color: var(--text-muted); white-space: nowrap;">
                            ${dateStr ? `📅 ${dateStr}` : ''}
                        </div>
                    </div>
                    ${metaHtml}
                    ${bodyHtml}
                    ${tagsHtml}
                </div>
            `;
        }

        // 获取任务图标
        function getTaskIcon(status) {
            const icons = {
                'x': '✅',
                '*': '⭐',
                '-': '❌',
                '!': '❗',
                '/': '🔄',
                'i': 'ℹ️',
                '?': '❓',
                '"': '💬',
                ' ': '⭕'
            };
            return icons[status] || '⭕';
        }

        // 渲染任务文本（处理标签）
        function renderTaskText(text) {
            return text.replace(/#([a-zA-Z0-9/]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
        }

        // Markdown 渲染器（处理任务）
        function renderMarkdownWithTasks(text) {
            if (!text) return '';
            
            // 删除代码块
            let html = text.replace(/```[\s\S]*?```/g, '');
            
            // 处理任务行（特殊渲染，包括子项）
            const lines = html.split('\n');
            let result = [];
            let currentTask = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!\/?i])\]\s*(.+)$/);
                
                if (taskMatch) {
                    // 渲染上一个任务（如果有）
                    if (currentTask) {
                        result.push(currentTask.html);
                    }
                    
                    // 开始新任务
                    const [_, status, taskText] = taskMatch;
                    const icon = getTaskIcon(status);
                    currentTask = {
                        html: `<div style="display: flex; align-items: flex-start; gap: 8px; margin: 8px 0; padding: 8px 0; border-bottom: 1px solid var(--border-color);">
                            <span style="font-size: 16px; flex-shrink: 0;">${icon}</span>
                            <div style="flex: 1;">${renderTaskText(taskText)}</div>
                        </div>`,
                        subItems: []
                    };
                } else if (currentTask && (line.match(/^(\t|  )/) || line.trim() === '')) {
                    // 收集子项
                    if (line.trim()) {
                        currentTask.subItems.push(line.replace(/^[\t ]+/, ''));
                    }
                } else {
                    // 渲染当前任务（如果有）
                    if (currentTask) {
                        let taskHtml = currentTask.html;
                        if (currentTask.subItems.length > 0) {
                            taskHtml = taskHtml.replace('</div>', 
                                `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                                    ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                                </div></div>`);
                        }
                        result.push(taskHtml);
                        currentTask = null;
                    }
                    result.push(line);
                }
            }
            
            // 处理最后一个任务
            if (currentTask) {
                let taskHtml = currentTask.html;
                if (currentTask.subItems.length > 0) {
                    taskHtml = taskHtml.replace('</div>', 
                        `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                            ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                        </div></div>`);
                }
                result.push(taskHtml);
            }
            
            html = result.join('\n');
            
            // 处理标题
            html = html.replace(/^###\s+(.+)$/gm, '<h3 style="font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: var(--text-primary);">$1</h3>');
            html = html.replace(/^##\s+(.+)$/gm, '<h2 style="font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 6px;">$1</h2>');
            html = html.replace(/^#\s+(.+)$/gm, '<h1 style="font-size: 20px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary);">$1</h1>');
            
            // 处理粗体和斜体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // 处理行内代码
            html = html.replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 0.9em;">$1</code>');
            
            // 处理标签
            html = html.replace(/#([a-zA-Z0-9/_-]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
            
            // 处理链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: var(--accent-color); text-decoration: none;">$1</a>');
            
            // 处理内部链接
            html = html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$2</span>');
            html = html.replace(/\[\[([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$1</span>');
            
            // 处理列表（非任务）
            html = html.replace(/^-\s+(.+)$/gm, '<li style="margin: 4px 0; margin-left: 20px;">$1</li>');
            html = html.replace(/(<li[^>]*>.*<\/li>)/s, '<ul style="margin: 8px 0; padding-left: 20px;">$1</ul>');
            
            // 处理 Obsidian callout 语法 > [!type] 或 [!type]
            html = html.replace(/^>\s*\[!(\w+)\]\s*-?\s*(.*)$/gm, '<div style="background: var(--bg-tertiary); border-left: 3px solid var(--accent-color); padding: 12px; margin: 10px 0; border-radius: 4px;"><span style="font-weight: 600; color: var(--accent-color);">$1</span> $2</div>');
            html = html.replace(/^\[!(\w+)\]\s*-?\s*(.*)$/gm, '<div style="background: var(--bg-tertiary); border-left: 3px solid var(--accent-color); padding: 12px; margin: 10px 0; border-radius: 4px;"><span style="font-weight: 600; color: var(--accent-color);">$1</span> $2</div>');

            // 处理普通引用块
            html = html.replace(/^>\s+(.+)$/gm, '<blockquote style="border-left: 3px solid var(--accent-color); padding-left: 12px; margin: 10px 0; color: var(--text-secondary);">$1</blockquote>');
            
            // 处理分隔线
            html = html.replace(/^---$/gm, '<hr style="border: none; border-top: 1px solid var(--border-color); margin: 20px 0;">');
            
            // 处理换行
            html = html.replace(/\n\n/g, '</p><p style="margin: 10px 0;">');
            html = '<p style="margin: 10px 0;">' + html + '</p>';
            html = html.replace(/<p style="margin: 10px 0;"><\/p>/g, '');
            
            return html;
        }

        // 筛选笔记
        function filterNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // 获取选中的状态
            const checkedStatuses = [];
            document.querySelectorAll('#statusFilter input[type="checkbox"]:checked').forEach(function(cb) {
                checkedStatuses.push(cb.value);
            });
            
            // 如果没有任何状态被选中，显示全部；否则按选中状态筛选
            const hasStatusFilter = checkedStatuses.length > 0 && checkedStatuses.length < 9;
            
            filteredNotes = allNotes.filter(function(note) {
                // 搜索筛选
                if (searchTerm) {
                    const searchInTitle = note.title.toLowerCase().includes(searchTerm);
                    const searchInBody = note.body && note.body.toLowerCase().includes(searchTerm);
                    const searchInPath = note.filePath.toLowerCase().includes(searchTerm);
                    const searchInTasks = note.tasks && note.tasks.some(function(task) { 
                        return task.text.toLowerCase().includes(searchTerm) || 
                               (task.subItems && task.subItems.some(function(sub) { return sub.toLowerCase().includes(searchTerm); }));
                    });
                    
                    if (!searchInTitle && !searchInBody && !searchInPath && !searchInTasks) {
                        return false;
                    }
                }
                
                // 状态筛选 - 按单个任务行筛选（仅当有状态被取消勾选时）
                if (hasStatusFilter) {
                    const hasMatchingStatus = note.tasks && note.tasks.some(function(task) { 
                        return checkedStatuses.indexOf(task.status) !== -1;
                    });
                    if (!hasMatchingStatus) return false;
                }
                
                // 标签筛选 - 按包含该标签的任务行筛选（使用完整标签名匹配）
                if (selectedTags.size > 0) {
                    const hasMatchingTag = note.tasks && note.tasks.some(function(task) {
                        const taskText = task.text || '';
                        const subItems = task.subItems || [];
                        
                        for (const selectedTag of selectedTags) {
                            // 检查任务文本中是否有这个完整标签
                            const tagPattern = '#' + selectedTag.replace(/\//g, '\\/');
                            const regex = new RegExp(tagPattern + '(?=\\/|\\s|$|,)', 'g');
                            
                            if (regex.test(taskText)) {
                                return true;
                            }
                            // 检查子项中的标签
                            for (let j = 0; j < subItems.length; j++) {
                                if (regex.test(subItems[j])) {
                                    return true;
                                }
                            }
                        }
                        return false;
                    });
                    
                    if (!hasMatchingTag) return false;
                }
                
                return true;
            });
            
            renderNotes();
            updateStats();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalNotes').textContent = allNotes.length;
            document.getElementById('filteredNotes').textContent = filteredNotes.length;
        }

        // 更新标签云 - 按任务行提取标签
        function updateTagCloud() {
            var tagCount = {};
            
            // 从每个笔记的任务行中提取标签
            allNotes.forEach(function(note) {
                if (note.tasks) {
                    note.tasks.forEach(function(task) {
                        // 提取任务文本中的标签
                        var tagMatches = task.text.match(/#([a-zA-Z0-9\/]+)/g) || [];
                        tagMatches.forEach(function(tag) {
                            var tagName = tag.substring(1);
                            tagCount[tagName] = (tagCount[tagName] || 0) + 1;
                        });
                        
                        // 提取子项中的标签
                        if (task.subItems) {
                            task.subItems.forEach(function(subItem) {
                                var subMatches = subItem.match(/#([a-zA-Z0-9\/]+)/g) || [];
                                subMatches.forEach(function(tag) {
                                    var tagName = tag.substring(1);
                                    tagCount[tagName] = (tagCount[tagName] || 0) + 1;
                                });
                            });
                        }
                    });
                }
            });
            
            var tagCloud = document.getElementById('tagCloud');
            var allTags = Object.keys(tagCount).sort();
            
            // 全部选项
            var allActive = selectedTags.size === 0;
            var html = '<div class="tag-pill ' + (allActive ? 'active' : '') + '" onclick="clearAllTags()" style="margin-bottom: 8px; cursor: pointer;">全部</div>';
            
            // 构建标签层级
            var tagHierarchy = {};
            allTags.forEach(function(tag) {
                var parts = tag.split('/');
                var current = tagHierarchy;
                for (var i = 0; i < parts.length; i++) {
                    var path = parts.slice(0, i + 1).join('/');
                    if (!current[path]) {
                        current[path] = { count: 0, children: {} };
                    }
                    if (i === parts.length - 1) {
                        current[path].count = tagCount[tag];
                    }
                    current = current[path].children;
                }
            });
            
            // 渲染标签树
            function renderTagTree(node, level) {
                level = level || 0;
                var html = '';
                var keys = Object.keys(node).sort();
                keys.forEach(function(tag) {
                    var data = node[tag];
                    var isActive = selectedTags.has(tag);
                    var hasChildren = Object.keys(data.children).length > 0;
                    var marginLeft = level * 16;
                    var fullTagName = tag; // 完整标签名
                    var countStr = data.count > 0 ? '(' + data.count + ')' : '';
                    
                    html += '<div class="tag-pill ' + (isActive ? 'active' : '') + '" ' +
                            'onclick="toggleTag(\'' + tag.replace(/'/g, "\\'") + '\')" ' +
                            'style="margin-left: ' + marginLeft + 'px; margin-bottom: 2px; display: block; cursor: pointer; text-align: left;">' +
                            fullTagName + ' ' + countStr + '</div>';
                    
                    if (hasChildren) {
                        html += renderTagTree(data.children, level + 1);
                    }
                });
                return html;
            }
            
            html += renderTagTree(tagHierarchy);
            tagCloud.innerHTML = html;
        }

        // 切换标签
        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            updateTagCloud();
            filterNotes();
        }

        // 清除所有标签
        function clearAllTags() {
            selectedTags.clear();
            updateTagCloud();
            filterNotes();
        }

        // 刷新笔记
        async function refreshNotes() {
            if (directoryHandle) {
                if (directoryHandle.isSafari) {
                    // Safari 兼容模式：重新处理已选择的文件
                    await handleSafariFiles(directoryHandle.files);
                } else {
                    // 现代浏览器模式：重新加载目录
                    await loadNotes(true);
                }
            } else {
                showMessage('请先选择文件夹', 'error');
            }
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = message;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        // 切换暗黑模式
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // 暴露函数到全局作用域（供 onclick 调用）
        window.selectFolder = selectFolder;
        window.toggleDarkMode = toggleDarkMode;
        window.refreshNotes = refreshNotes;
        window.prevMonth = prevMonth;
        window.nextMonth = nextMonth;
        window.selectDate = selectDate;
        window.showNoteDetail = showNoteDetail;
        window.showMergedFolderDetail = showMergedFolderDetail;
        window.backToList = backToList;
        window.toggleTag = toggleTag;
        window.clearAllTags = clearAllTags;
        window.filterNotes = filterNotes;
        window.handleSafariFiles = handleSafariFiles;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
            
            // 检测浏览器兼容性
            if (!isFileSystemAccessSupported()) {
                document.getElementById('browserWarning').style.display = 'block';
                console.log('Safari/Firefox 兼容模式已启用');
            }
        });
    </script>
