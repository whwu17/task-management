<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent-color: #4a90e2;
            --border-color: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
            --tag-bg: #e3f2fd;
            --tag-color: #1976d2;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3d3d3d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent-color: #64b5f6;
            --border-color: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
            --tag-bg: #1565c0;
            --tag-color: #bbdefb;
            --success-color: #81c784;
            --warning-color: #ffb74d;
            --danger-color: #e57373;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            margin: 0;
            padding: 0;
            display: grid;
            grid-template-columns: 260px 240px 1fr;
            gap: 0;
            height: 100vh;
        }

        .sidebar {
            background: var(--bg-primary);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            height: 100vh;
        }

        .sidebar h1 {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }
        
        .calendar-section {
            min-height: 0;
            flex: 0 0 auto;
        }
        
        #calendarContainer {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 8px;
            background: var(--bg-secondary);
        }

        .sidebar-section:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .calendar-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }

        .calendar-tab {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .calendar-tab:hover {
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .calendar-tab.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .calendar-title {
            font-size: 14px;
            font-weight: 600;
        }

        .calendar-nav {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .calendar-nav:hover {
            color: var(--accent-color);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background: var(--bg-tertiary);
        }

        .calendar-day.has-note {
            background: var(--tag-bg);
            color: var(--tag-color);
            font-weight: 600;
        }

        /* Tag-based calendar colors */
        .calendar-day.type-work {
            background: #e3f2fd;
            color: #1976d2;
            font-weight: 600;
        }

        .calendar-day.type-life {
            background: #f3e5f5;
            color: #7b1fa2;
            font-weight: 600;
        }

        .calendar-day.type-study {
            background: #e8f5e9;
            color: #388e3c;
            font-weight: 600;
        }

        .calendar-day.type-health {
            background: #fff3e0;
            color: #f57c00;
            font-weight: 600;
        }

        .calendar-day.type-entertainment {
            background: #fce4ec;
            color: #c2185b;
            font-weight: 600;
        }

        .calendar-day.type-travel {
            background: #e0f7fa;
            color: #0097a7;
            font-weight: 600;
        }

        .calendar-day.type-default {
            background: var(--tag-bg);
            color: var(--tag-color);
            font-weight: 600;
        }

        /* Done calendar colors - green */
        .calendar-day.type-done {
            background: #c8e6c9;
            color: #2e7d32;
            font-weight: 600;
        }

        /* Due calendar colors - orange-red */
        .calendar-day.type-due {
            background: #ffccbc;
            color: #d84315;
            font-weight: 600;
        }

        /* Scheduled calendar colors - orange */
        .calendar-day.type-scheduled {
            background: #ffe0b2;
            color: #e65100;
            font-weight: 600;
        }

        .calendar-day.today {
            border: 2px solid var(--accent-color);
        }

        .calendar-day.empty {
            cursor: default;
        }

        .calendar-day.other-month {
            color: var(--text-muted);
        }

        .directory-tree {
            font-size: 13px;
        }

        .tree-item {
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background-color 0.2s;
        }

        .tree-item:hover {
            background: var(--bg-tertiary);
        }

        .tree-item.active {
            background: var(--tag-bg);
            color: var(--tag-color);
        }

        .tree-folder {
            font-weight: 600;
            margin-top: 8px;
        }

        .tree-file {
            padding-left: 20px;
        }

        .tree-icon {
            font-size: 12px;
        }

        .notes-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent-color);
        }

        .note-group {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .group-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .note-item-full.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent-color);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-pill {
            padding: 4px 10px;
            background: transparent;
            color: var(--tag-color);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            display: inline-block;
            margin: 2px;
        }

        .tag-pill:hover {
            background: var(--tag-bg);
            border-color: var(--tag-color);
        }

        .tag-pill.active {
            background: var(--tag-bg);
            border-color: var(--tag-color);
            font-weight: 600;
        }

        .tag-pill::before {
            content: '#';
            opacity: 0.6;
            margin-right: 1px;
        }

        .status-filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-filter-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .status-filter-group label:hover {
            background: var(--bg-tertiary);
        }

        .status-filter-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .task-icon {
            font-size: 14px;
        }

        .notes-area {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100vh;
        }

        .notes-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .notes-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .notes-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #357abd;
            transform: translateY(-1px);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .note-item-full {
            background: var(--bg-secondary);
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .note-item-full:last-child {
            border-bottom: none;
        }

        .note-item-full:hover {
            background: var(--bg-tertiary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success { background: var(--success-color); }
        .message.error { background: var(--danger-color); }
        .message.info { background: var(--accent-color); }

        /* Task sections for diary detail view */
        .task-section {
            margin: 15px 0;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
        }

        .task-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-section.done {
            border-left-color: var(--success-color);
        }

        .task-section.due {
            border-left-color: #ff5722;
        }

        .task-section.scheduled {
            border-left-color: var(--warning-color);
        }

        .task-section-item {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-radius: 4px;
            margin: 6px 0;
            font-size: 13px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .task-section-item .task-icon {
            font-size: 14px;
            flex-shrink: 0;
        }

        /* Timeline view for Done/Created/Scheduled */
        .timeline-container {
            padding: 20px;
        }

        .timeline-date-group {
            margin-bottom: 25px;
        }

        .timeline-date-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .timeline-items {
            padding-left: 20px;
            border-left: 2px solid var(--border-color);
        }

        .timeline-item {
            position: relative;
            padding: 10px 15px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 10px;
            margin-left: 15px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 15px;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        .timeline-item.done::before {
            background: var(--success-color);
        }

        .timeline-item.scheduled::before {
            background: var(--warning-color);
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .sidebar:first-child {
                order: 1;
            }
            
            .sidebar:nth-child(2) {
                order: 2;
            }
            
            main {
                order: 3;
                height: auto;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 第一栏：过滤和设置 -->
        <aside class="sidebar">
            <h1>笔记</h1>
            
            <div class="sidebar-section">
                <button onclick="selectFolder()" style="width: 100%; margin-bottom: 8px;">选择文件夹</button>
                <button onclick="refreshNotes()" style="width: 100%; margin-bottom: 8px;">刷新</button>
                <button onclick="toggleDarkMode()" id="darkModeToggle" style="width: 100%;">切换主题</button>
                
                <div id="browserWarning" style="display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 12px; color: #856404;">
                    浏览器不支持现代API
                </div>
            </div>

            <div class="sidebar-section">
                <h3>统计</h3>
                <div class="stats">
                    <div>总笔记: <span id="totalNotes">0</span></div>
                    <div>已筛选: <span id="filteredNotes">0</span></div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>搜索</h3>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="filterNotes()">
                </div>
            </div>

            <div class="sidebar-section">
                <h3>标签筛选</h3>
                <div class="tag-cloud" id="tagCloud">
                    <!-- 标签动态生成 -->
                </div>
            </div>

            <div class="sidebar-section">
                <h3>状态筛选</h3>
                <div class="status-filter-group" id="statusFilter">
                    <label><input type="checkbox" value="i" checked onchange="filterNotes()"> <span class="task-icon">ℹ️</span> 信息 [i]</label>
                    <label><input type="checkbox" value="?" checked onchange="filterNotes()"> <span class="task-icon">❓</span> 疑问 [?]</label>
                    <label><input type="checkbox" value=" " checked onchange="filterNotes()"> <span class="task-icon">⭕</span> 待办 [ ]</label>
                    <label><input type="checkbox" value="*" checked onchange="filterNotes()"> <span class="task-icon">⭐</span> 星标 [*]</label>
                    <label><input type="checkbox" value="x" checked onchange="filterNotes()"> <span class="task-icon">✅</span> 完成 [x]</label>
                    <label><input type="checkbox" value="-" checked onchange="filterNotes()"> <span class="task-icon">❌</span> 取消 [-]</label>
                    <label><input type="checkbox" value="!" checked onchange="filterNotes()"> <span class="task-icon">🔴</span> 重要 [!]</label>
                    <label><input type="checkbox" value="/" checked onchange="filterNotes()"> <span class="task-icon">🔄</span> 进行中 [/]</label>
                    <label><input type="checkbox" value="\“" checked onchange="filterNotes()"> <span class="task-icon">💬</span> 引用 [“]</label>
                </div>
            </div>

        </aside>

        <!-- 第二栏：日历和目录树 -->
        <aside class="sidebar" style="border-right: 1px solid var(--border-color);">
            <div class="sidebar-section calendar-section">
                <h3>日历视图</h3>
                <div class="calendar-tabs">
                    <div class="calendar-tab active" onclick="switchCalendarTab('diary')" id="tabDiary">日期</div>
                    <div class="calendar-tab" onclick="switchCalendarTab('done')" id="tabDone">Done</div>
                    <div class="calendar-tab" onclick="switchCalendarTab('due')" id="tabDue">Due</div>
                    <div class="calendar-tab" onclick="switchCalendarTab('scheduled')" id="tabScheduled">Scheduled</div>
                </div>
                <div id="calendarContainer">
                    <!-- 日历将动态生成 -->
                </div>
            </div>

            <div class="sidebar-section" style="flex: 1; overflow-y: auto;">
                <h3>目录</h3>
                <div class="directory-tree" id="directoryTree">
                    <!-- 目录树将动态生成 -->
                </div>
            </div>
        </aside>

        <!-- 第三栏：笔记内容 -->
        <main class="notes-area">
            <div class="notes-header">
                <h2 id="notesTitle">笔记列表</h2>
                <div class="notes-actions">
                    <button onclick="refreshNotes()">刷新</button>
                </div>
            </div>
            
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <h3>请选择文件夹开始</h3>
                    <p>点击"选择文件夹"按钮加载您的笔记</p>
                </div>
            </div>
        </main>
    </div>

    <!-- 隐藏的文件输入用于 Safari -->
    <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" onchange="handleSafariFiles(this.files)">

    <script>
        let allNotes = [];
        let filteredNotes = [];
        let diaryNotes = [];
        let normalNotes = [];
        let allTasks = []; // 所有任务（用于Done/Created/Scheduled日历）
        let selectedTags = new Set();
        let selectedStatuses = new Set();
        let directoryHandle = null;
        let currentMonth = new Date();
        let selectedDate = null;
        let selectedNoteFilePath = null;
        let currentCalendarTab = 'diary'; // 当前日历Tab
        let isRefreshing = false; // 防止刷新重复弹窗

        // 检测浏览器支持
        function isFileSystemAccessSupported() {
            return 'showDirectoryPicker' in window;
        }

        // 验证并请求目录权限
        async function verifyPermission(dirHandle, isRefresh = false) {
            try {
                if (isRefresh && dirHandle.queryPermission) {
                    const currentState = await dirHandle.queryPermission({ mode: 'read' });
                    if (currentState === 'granted') {
                        return true;
                    }
                }
                
                if (dirHandle.requestPermission) {
                    const result = await dirHandle.requestPermission({ mode: 'read' });
                    if (result === 'granted') {
                        return true;
                    }
                    throw new Error('没有权限访问该文件夹');
                }
                return true;
            } catch (err) {
                console.log('Permission check:', err);
                return true;
            }
        }

        // 选择文件夹
        async function selectFolder() {
            console.log('selectFolder called, FileSystemAccess supported:', isFileSystemAccessSupported());
            
            if (isFileSystemAccessSupported()) {
                try {
                    console.log('Opening directory picker...');
                    directoryHandle = await window.showDirectoryPicker();
                    console.log('Directory selected:', directoryHandle.name);
                    await loadNotes();
                } catch (error) {
                    console.error('Directory picker error:', error.name, error.message);
                    if (error.name !== 'AbortError') {
                        showMessage('选择文件夹失败: ' + error.message, 'error');
                    }
                }
            } else {
                console.log('Using Safari fallback');
                document.getElementById('folderInput').click();
            }
        }

        // Safari 文件处理
        async function handleSafariFiles(files) {
            if (!files || files.length === 0) return;
            
            directoryHandle = {
                name: files[0].webkitRelativePath.split('/')[0] || 'Selected Folder',
                isSafari: true,
                files: files
            };
            
            showMessage('正在加载笔记...', 'info');
            allNotes = [];
            diaryNotes = [];
            normalNotes = [];
            allTasks = [];
            
            try {
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const content = await file.text();
                        const path = file.webkitRelativePath || file.name;
                        const isInDiaryFolder = path.includes('/Diary/') || path.includes('/diary/');
                        const note = parseNote(content, path, isInDiaryFolder);
                        if (note) {
                            allNotes.push(note);
                            if (note.isDiary) {
                                diaryNotes.push(note);
                            } else {
                                normalNotes.push(note);
                            }
                            // 收集所有任务
                            collectTasksFromNote(note);
                        }
                    }
                }
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                updateCalendar();
                updateDirectoryTree();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            }
        }

        // 从笔记收集任务
        function collectTasksFromNote(note) {
            if (!note.tasks) return;
            
            note.tasks.forEach(task => {
                const taskInfo = {
                    text: task.text,
                    status: task.status,
                    subItems: task.subItems || [],
                    notePath: note.filePath,
                    noteDate: note.date,
                    // 从任务文本中提取日期相关字段
                    doneDate: extractDateFromText(task.text, 'done'),
                    dueDate: extractDateFromText(task.text, 'due'),
                    scheduledDate: extractDateFromText(task.text, 'scheduled')
                };
                allTasks.push(taskInfo);
            });
        }

        // 从任务文本中提取日期
        function extractDateFromText(text, type) {
            // 支持emoji格式: ⏳ 2026-05-10, 📅 2025-10-28, ✅ 2026-05-09
            // 以及标签格式: #done/2024-01-15, #due/2024-01-15, #scheduled/2024-01-15
            
            let emojiPattern;
            if (type === 'done') {
                emojiPattern = /✅\s*(\d{4}-\d{2}-\d{2})/;
            } else if (type === 'due') {
                emojiPattern = /📅\s*(\d{4}-\d{2}-\d{2})/;
            } else if (type === 'scheduled') {
                emojiPattern = /⏳\s*(\d{4}-\d{2}-\d{2})/;
            }
            
            // 先尝试emoji格式
            if (emojiPattern) {
                const emojiMatch = text.match(emojiPattern);
                if (emojiMatch) {
                    console.log(`Found ${type} date: ${emojiMatch[1]} from text: ${text}`);
                    return emojiMatch[1];
                }
            }
            
            // 再尝试标签格式
            const tagPattern = new RegExp(`#${type}/(\\d{4}-\\d{2}-\\d{2})`, 'i');
            const tagMatch = text.match(tagPattern);
            return tagMatch ? tagMatch[1] : null;
        }

        // 加载笔记
        async function loadNotes(isRefresh = false) {
            if (isRefreshing) {
                console.log('Already refreshing, skipping...');
                return;
            }
            
            isRefreshing = true;
            showMessage('正在加载笔记...', 'info');
            
            try {
                if (!directoryHandle) {
                    throw new Error('请先选择文件夹');
                }
                
                await verifyPermission(directoryHandle, isRefresh);
                
                allNotes = [];
                diaryNotes = [];
                normalNotes = [];
                allTasks = [];
                await processDirectory(directoryHandle);
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                updateCalendar();
                updateDirectoryTree();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            } finally {
                isRefreshing = false;
            }
        }

        // 递归处理目录
        async function processDirectory(dirHandle, path = '', isInDiaryFolder = false) {
            for await (const entry of dirHandle.values()) {
                const entryPath = path ? `${path}/${entry.name}` : entry.name;
                
                const isDiaryFolder = entry.name === 'Diary' || entry.name === 'diary' || isInDiaryFolder;
                
                if (entry.kind === 'directory') {
                    const subDirHandle = await dirHandle.getDirectoryHandle(entry.name);
                    await processDirectory(subDirHandle, entryPath, isDiaryFolder);
                } else if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                    try {
                        const file = await entry.getFile();
                        const content = await file.text();
                        const note = parseNote(content, entryPath, isDiaryFolder);
                        if (note) {
                            allNotes.push(note);
                            if (note.isDiary) {
                                diaryNotes.push(note);
                            } else {
                                normalNotes.push(note);
                            }
                            collectTasksFromNote(note);
                        }
                    } catch (error) {
                        console.warn(`无法读取文件 ${entryPath}:`, error);
                    }
                }
            }
        }

        // 解析笔记
        function parseNote(content, filePath, forceDiary = false) {
            const lines = content.split('\n');
            let frontmatter = {};
            let bodyStart = 0;
            
            // 解析 YAML frontmatter
            if (lines[0] === '---') {
                let i = 1;
                while (i < lines.length && lines[i] !== '---') {
                    const line = lines[i].trim();
                    if (line) {
                        const colonIndex = line.indexOf(':');
                        if (colonIndex > 0) {
                            const key = line.substring(0, colonIndex).trim();
                            const value = line.substring(colonIndex + 1).trim();
                            
                            if (value === '' || value.startsWith('-')) {
                                const array = [];
                                let j = i + 1;
                                while (j < lines.length && lines[j] !== '---') {
                                    const arrayLine = lines[j].trim();
                                    if (arrayLine.startsWith('-')) {
                                        const item = arrayLine.substring(1).trim().replace(/^["']|["']$/g, '');
                                        if (item) array.push(item);
                                    } else if (arrayLine === '') {
                                        // 空行继续
                                    } else if (!arrayLine.includes(':') && array.length > 0) {
                                        // 可能是数组项的续行
                                        const item = arrayLine.replace(/^["']|["']$/g, '').trim();
                                        if (item) {
                                            array[array.length - 1] += ' ' + item;
                                        }
                                    } else {
                                        break;
                                    }
                                    j++;
                                }
                                frontmatter[key] = array;
                                i = j - 1;
                            } else {
                                frontmatter[key] = value.replace(/^["']|["']$/g, '');
                            }
                        }
                    }
                    i++;
                }
                if (i < lines.length && lines[i] === '---') {
                    bodyStart = i + 1;
                }
            }
            
            // 提取日期从文件路径
            let date = null;
            let isDiary = forceDiary;
            const dateMatch = filePath.match(/(\d{4})[\/-](\d{2})[\/-](\d{2})/);
            if (dateMatch) {
                date = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
                if (!isDiary && filePath.match(/\d{4}[\/-]\d{2}[\/-]\d{2}/)) {
                    isDiary = true;
                }
            }
            
            // 提取任务
            const tasks = [];
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!\/?\"i])\]\s*(.+)$/);
                if (taskMatch) {
                    const status = taskMatch[1];
                    const text = taskMatch[2];
                    
                    const subItems = [];
                    let j = i + 1;
                    while (j < lines.length) {
                        const subLine = lines[j];
                        if (subLine.match(/^(\t|  )/)) {
                            subItems.push(subLine.replace(/^[\t ]+/, '').trim());
                            j++;
                        } else {
                            break;
                        }
                    }
                    
                    tasks.push({
                        status,
                        text,
                        subItems: subItems.length > 0 ? subItems : null
                    });
                }
            }
            
            // 提取标题
            let title;
            if (isDiary && date) {
                title = date;
            } else {
                title = filePath.split('/').pop().replace('.md', '');
                for (let i = bodyStart; i < lines.length; i++) {
                    const headerMatch = lines[i].match(/^#\s+(.+)$/);
                    if (headerMatch) {
                        title = headerMatch[1].trim();
                        break;
                    }
                }
}
            
            // 收集所有 frontmatter 作为 meta tags
            const metaTags = [];
            for (const [key, value] of Object.entries(frontmatter)) {
                if (key !== 'tags' && value) {
                    metaTags.push({ key, value });
                }
            }
            
            // 提取完整正文内容
            let bodyContent = [];
            let inCodeBlock = false;
            let inDoneSection = false;
            let inScheduledSection = false;
            let inPendingSection = false;
            
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                
                if (line.match(/^##?\s*Done\s*$/i)) {
                    inDoneSection = true;
                    inScheduledSection = false;
                    inPendingSection = false;
                    continue;
                }
                
                if (line.match(/^##?\s*Scheduled\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = true;
                    inPendingSection = false;
                    continue;
                }
                
                if (line.match(/^##?\s*Pending\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = false;
                    inPendingSection = true;
                    continue;
                }
                
                if (inDoneSection || inScheduledSection || inPendingSection) {
                    if (line.match(/^#{1,2}\s+[^#]/)) {
                        inDoneSection = false;
                        inScheduledSection = false;
                        inPendingSection = false;
                    } else {
                        continue;
                    }
                }
                
                if (line.startsWith('```')) {
                    inCodeBlock = !inCodeBlock;
                    continue;
                }
                if (inCodeBlock) {
                    continue;
                }
                
                bodyContent.push(line);
            }
            
            // 解析标签
            let tags = [];
            if (frontmatter.tags) {
                console.log(`Frontmatter tags for ${filePath}:`, frontmatter.tags);
                if (Array.isArray(frontmatter.tags)) {
                    tags = frontmatter.tags.map(t => t.trim());
                } else if (typeof frontmatter.tags === 'string') {
                    tags = frontmatter.tags.split(',').map(t => t.trim());
                }
            }

            console.log(`Final parsed tags for ${filePath}:`, tags);

            return {
                title,
                filePath,
                date,
                isDiary,
                tasks,
                tags,
                metaTags,
                body: bodyContent.join('\n').trim()
            };
        }

        // 切换日历Tab
        function switchCalendarTab(tab) {
            currentCalendarTab = tab;
            
            // 更新Tab样式
            document.querySelectorAll('.calendar-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            
            // 更新日历和右侧列表
            updateCalendar();
            renderNotes();
        }

        // 获取日期的主要类型标签（用于日历颜色）
        function getDiaryTypeForDate(dateStr) {
            const notes = diaryNotes.filter(note => note.date && note.date.startsWith(dateStr));
            const typeCount = {};
            let maxType = '';
            let maxCount = 0;

            notes.forEach(note => {
                note.tags.forEach(tag => {
                    if (tag.startsWith('type/')) {
                        const type = tag.split('/')[1];
                        typeCount[type] = (typeCount[type] || 0) + 1;
                        if (typeCount[type] > maxCount) {
                            maxCount = typeCount[type];
                            maxType = type;
                        }
                    }
                });
            });

            return maxType;
        }

        // 更新日历
        function updateCalendar() {
            const container = document.getElementById('calendarContainer');
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();

            // 根据当前Tab获取有数据的日期
            const datesWithData = {};
            const dateTypes = {};
            
            if (currentCalendarTab === 'diary') {
                // 日期日历：显示有日记的日期
                diaryNotes.forEach(note => {
                    if (note.date) {
                        const d = note.date.substring(0, 10);
                        datesWithData[d] = true;
                        if (!dateTypes[d]) {
                            dateTypes[d] = getDiaryTypeForDate(d);
                        }
                    }
                });
            } else if (currentCalendarTab === 'done') {
                // Done日历：显示有完成任务的日期
                allTasks.forEach(task => {
                    if (task.doneDate) {
                        const d = task.doneDate.substring(0, 10);
                        datesWithData[d] = true;
                        dateTypes[d] = 'done';
                    }
                });
            } else if (currentCalendarTab === 'due') {
                // Due日历：显示有截止日期任务的日期
                console.log('Building due calendar, total tasks:', allTasks.length);
                allTasks.forEach(task => {
                    if (task.dueDate) {
                        const d = task.dueDate.substring(0, 10);
                        datesWithData[d] = true;
                        dateTypes[d] = 'due';
                        console.log(`Due calendar: added date ${d} from task: ${task.text}`);
                    }
                });
                console.log('Due calendar dates:', Object.keys(datesWithData));
            } else if (currentCalendarTab === 'scheduled') {
                // Scheduled日历：显示有计划任务的日期
                allTasks.forEach(task => {
                    if (task.scheduledDate) {
                        const d = task.scheduledDate.substring(0, 10);
                        datesWithData[d] = true;
                        dateTypes[d] = 'scheduled';
                    }
                });
            }
            
            const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                               '七月', '八月', '九月', '十月', '十一月', '十二月'];
            
            let html = '<div class="calendar-header">';
            html += '<button class="calendar-nav" onclick="prevMonth()">◀</button>';
            html += '<span class="calendar-title">' + year + '年 ' + monthNames[month] + '</span>';
            html += '<button class="calendar-nav" onclick="nextMonth()">▶</button>';
            html += '</div>';
            
            html += '<div class="calendar-weekdays">';
            ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
                html += '<div>' + d + '</div>';
            });
            html += '</div>';
            
            html += '<div class="calendar-days">';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const today = new Date();
            const todayStr = today.toISOString().substring(0, 10);
            
            // 上个月的天数
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                html += '<div class="calendar-day empty other-month">' + day + '</div>';
            }
            
            // 本月的天数
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
                const hasNote = datesWithData[dateStr];
                const isToday = dateStr === todayStr;
                const isSelected = selectedDate === dateStr;
                const diaryType = dateTypes[dateStr];

                let classes = 'calendar-day';
                if (hasNote) {
                    if (diaryType && diaryType.trim()) {
                        const typeClass = 'type-' + diaryType.toLowerCase();
                        classes += ' ' + typeClass;
                    } else {
                        classes += ' has-note';
                    }
                }
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';

                html += '<div class="' + classes + '" onclick="selectDate(\'' + dateStr + '\')">' + day + '</div>';
            }
            
            // 下个月的天数
            const totalCells = firstDay + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                html += '<div class="calendar-day empty other-month">' + i + '</div>';
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        // 上个月
        function prevMonth() {
            currentMonth.setMonth(currentMonth.getMonth() - 1);
            updateCalendar();
        }

        // 下个月
        function nextMonth() {
            currentMonth.setMonth(currentMonth.getMonth() + 1);
            updateCalendar();
        }

        // 选择日期
        function selectDate(dateStr) {
            selectedDate = selectedDate === dateStr ? null : dateStr;
            updateCalendar();
            
            if (selectedDate) {
                // 根据当前Tab筛选数据
                if (currentCalendarTab === 'diary') {
                    // 日期日历：筛选该日期的日记
                    filteredNotes = allNotes.filter(note => {
                        if (!note.isDiary) return true;
                        return note.date && note.date.startsWith(selectedDate);
                    });
                } else {
                    // Done/Created/Scheduled日历：显示该日期所有任务的时间线
                    filteredNotes = [];
                }
            } else {
                filteredNotes = [...allNotes];
            }
            
            filterNotes();
            renderNotes();
            
            if (selectedDate) {
                setTimeout(() => {
                    var target = document.querySelector('[data-date^="' + selectedDate + '"]');
                    if (target) {
                        smoothScrollTo(target);
                    }
                }, 100);
            }
        }

        // 平滑滚动
        function smoothScrollTo(target) {
            var notesList = document.getElementById('notesList');
            if (!notesList) return;
            
            var startY = notesList.scrollTop;
            var targetY = target.offsetTop - notesList.offsetTop - 20;
            var distance = targetY - startY;
            var duration = Math.min(500, Math.max(200, Math.abs(distance) / 2));
            var startTime = null;
            
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                var elapsed = timestamp - startTime;
                var progress = Math.min(elapsed / duration, 1);
                var easeProgress = 1 - Math.pow(1 - progress, 3);
                notesList.scrollTop = startY + distance * easeProgress;
                
                if (elapsed < duration) {
                    requestAnimationFrame(step);
                }
            }
            
            requestAnimationFrame(step);
        }

        // 返回列表
        function backToList() {
            selectedNoteFilePath = null;
            filteredNotes = [...allNotes];
            if (selectedDate) {
                selectDate(selectedDate);
            } else {
                renderNotes();
            }
        }

                const dueTasks = allTasks.filter(task => task.dueDate && task.dueDate.startsWith(dateStr));
                if (dueTasks.length > 0) {
                    fullContent += '<div class="task-section due">' +
                        '<div class="task-section-title">� Due (' + dueTasks.length + ')</div>';

                            '<span class="task-icon">' + getTaskIcon(task.status) + '</span>' +
                            '<span>' + renderTaskText(task.text) + '</span>' +
                            '</div>';
                    });
                    fullContent += '</div>';
                }
                
                // Scheduled tasks: tasks with #scheduled/YYYY-MM-DD matching this date
                const scheduledTasks = allTasks.filter(task => task.scheduledDate && task.scheduledDate.startsWith(dateStr));
                if (scheduledTasks.length > 0) {
                    fullContent += '<div class="task-section scheduled">' +
                        '<div class="task-section-title">📅 Scheduled (' + scheduledTasks.length + ')</div>';
                    scheduledTasks.forEach(task => {
                        fullContent += '<div class="task-section-item">' +

        // 显示合并文件夹详情（Bases文件夹下的子文件夹）
        function showMergedFolderDetail(folderPath) {

                fullContent += '<div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">' + note.filePath + '</div>';
                fullContent += '</div>';

                if (note.metaTags && note.metaTags.length > 0) {

                            meta.key + ': <span style="color: var(--text-secondary);">' + meta.value + '</span></span>';
