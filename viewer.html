<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-muted: #999999;
            --accent-color: #4a90e2;
            --border-color: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.1);
            --tag-bg: #e3f2fd;
            --tag-color: #1976d2;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3d3d3d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --accent-color: #64b5f6;
            --border-color: #404040;
            --shadow: rgba(0, 0, 0, 0.3);
            --tag-bg: #1565c0;
            --tag-color: #bbdefb;
            --success-color: #81c784;
            --warning-color: #ffb74d;
            --danger-color: #e57373;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .sidebar {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .sidebar h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .filter-section h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-pill {
            padding: 4px 10px;
            background: transparent;
            color: var(--tag-color);
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            display: inline-block;
            margin: 2px;
        }

        .tag-pill:hover {
            background: var(--tag-bg);
            border-color: var(--tag-color);
        }

        .tag-pill.active {
            background: var(--tag-bg);
            border-color: var(--tag-color);
            font-weight: 600;
        }

        .tag-pill::before {
            content: '#';
            opacity: 0.6;
            margin-right: 1px;
        }

        .status-filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-filter-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .status-filter-group label:hover {
            background: var(--bg-tertiary);
        }

        .status-filter-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .task-icon {
            font-size: 14px;
        }

        .notes-area {
            background: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .notes-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
        }

        .notes-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .notes-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: var(--accent-color);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        button:hover {
            background: #357abd;
            transform: translateY(-1px);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .note-item-full {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 20px;
            margin: 15px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow);
            cursor: pointer;
            transition: all 0.2s;
        }

        .note-item-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
            border-color: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .message.success { background: var(--success-color); }
        .message.error { background: var(--danger-color); }
        .message.info { background: var(--accent-color); }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .sidebar {
                order: 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1>📚 笔记查看器</h1>
            
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalNotes">0</div>
                    <div class="stat-label">总笔记</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="filteredNotes">0</div>
                    <div class="stat-label">已筛选</div>
                </div>
            </div>

            <div class="filter-section">
                <h3>搜索</h3>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索笔记..." oninput="filterNotes()">
                </div>
            </div>

            <div class="filter-section">
                <h3>标签筛选</h3>
                <div class="tag-cloud" id="tagCloud">
                    <!-- 标签动态生成 -->
                </div>
            </div>

            <div class="filter-section">
                <h3>状态筛选</h3>
                <div class="status-filter-group" id="statusFilter">
                    <label><input type="checkbox" value="i" checked onchange="filterNotes()"> <span class="task-icon">ℹ️</span> 信息 [i]</label>
                    <label><input type="checkbox" value="?" checked onchange="filterNotes()"> <span class="task-icon">❓</span> 疑问 [?]</label>
                    <label><input type="checkbox" value=" " checked onchange="filterNotes()"> <span class="task-icon">⭕</span> 待办 [ ]</label>
                    <label><input type="checkbox" value="*" checked onchange="filterNotes()"> <span class="task-icon">⭐</span> 星标 [*]</label>
                    <label><input type="checkbox" value="x" checked onchange="filterNotes()"> <span class="task-icon">✅</span> 完成 [x]</label>
                    <label><input type="checkbox" value="-" checked onchange="filterNotes()"> <span class="task-icon">❌</span> 取消 [-]</label>
                    <label><input type="checkbox" value="!" checked onchange="filterNotes()"> <span class="task-icon">🔴</span> 重要 [!]</label>
                    <label><input type="checkbox" value="/" checked onchange="filterNotes()"> <span class="task-icon">🔄</span> 进行中 [/]</label>
                    <label><input type="checkbox" value="&quot;" checked onchange="filterNotes()"> <span class="task-icon">💬</span> 引用 ["]</label>
                </div>
            </div>

            <!-- 隐藏的文件输入用于 Safari -->
            <input type="file" id="folderInput" webkitdirectory directory multiple style="display: none;" onchange="handleSafariFiles(this.files)">
            
            <button onclick="selectFolder()">选择文件夹</button>
            <button onclick="toggleDarkMode()" id="darkModeToggle">切换主题</button>
            
            <div id="browserWarning" style="display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-radius: 6px; font-size: 12px; color: #856404;">
                ⚠️ 您的浏览器不支持现代文件夹API，将使用兼容模式
            </div>
        </aside>

        <main class="notes-area">
            <div class="notes-header">
                <h2 id="notesTitle">笔记列表</h2>
                <div class="notes-actions">
                    <button onclick="refreshNotes()">刷新</button>
                </div>
            </div>
            
            <div class="notes-list" id="notesList">
                <div class="empty-state">
                    <h3>请选择文件夹开始</h3>
                    <p>点击"选择文件夹"按钮加载您的笔记</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allNotes = [];
        let filteredNotes = [];
        let selectedTags = new Set();
        let selectedStatuses = new Set();
        let directoryHandle = null;

        // 检测浏览器支持
        function isFileSystemAccessSupported() {
            return 'showDirectoryPicker' in window;
        }

        // 选择文件夹
        async function selectFolder() {
            if (isFileSystemAccessSupported()) {
                // Chrome/Edge 现代方式
                try {
                    directoryHandle = await window.showDirectoryPicker();
                    await loadNotes();
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        showMessage('选择文件夹失败: ' + error.message, 'error');
                    }
                }
            } else {
                // Safari 兼容方式
                document.getElementById('folderInput').click();
            }
        }

        // Safari 文件处理
        async function handleSafariFiles(files) {
            if (!files || files.length === 0) return;
            
            showMessage('正在加载笔记...', 'info');
            allNotes = [];
            
            try {
                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        const content = await file.text();
                        // 从 webkitRelativePath 构建路径
                        const path = file.webkitRelativePath || file.name;
                        const note = parseNote(content, path);
                        if (note) {
                            allNotes.push(note);
                        }
                    }
                }
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            }
        }

        // 加载笔记
        async function loadNotes() {
            showMessage('正在加载笔记...', 'info');
            
            try {
                allNotes = [];
                await processDirectory(directoryHandle);
                
                filteredNotes = [...allNotes];
                updateStats();
                updateTagCloud();
                renderNotes();
                
                showMessage(`成功加载 ${allNotes.length} 个笔记`, 'success');
            } catch (error) {
                showMessage('加载失败: ' + error.message, 'error');
            }
        }

        // 递归处理目录
        async function processDirectory(dirHandle, path = '') {
            for await (const entry of dirHandle.values()) {
                const entryPath = path ? `${path}/${entry.name}` : entry.name;
                
                if (entry.kind === 'directory') {
                    const subDirHandle = await dirHandle.getDirectoryHandle(entry.name);
                    await processDirectory(subDirHandle, entryPath);
                } else if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                    try {
                        const file = await entry.getFile();
                        const content = await file.text();
                        const note = parseNote(content, entryPath);
                        if (note) {
                            allNotes.push(note);
                        }
                    } catch (error) {
                        console.warn(`无法读取文件 ${entryPath}:`, error);
                    }
                }
            }
        }

        // 解析笔记
        function parseNote(content, filePath) {
            const lines = content.split('\n');
            let frontmatter = {};
            let bodyStart = 0;
            
            // 解析 YAML frontmatter
            if (lines[0] === '---') {
                for (let i = 1; i < lines.length; i++) {
                    if (lines[i] === '---') {
                        bodyStart = i + 1;
                        break;
                    }
                    const [key, value] = lines[i].split(':').map(s => s.trim());
                    if (key && value) {
                        frontmatter[key] = value.replace(/^["']|["']$/g, '');
                    }
                }
            }
            
            // 提取日期从文件路径（支持 2024/01-15.md 或 2024/01/15.md 格式）
            let date = null;
            let isDiary = false;
            const dateMatch = filePath.match(/(\d{4})[\/-](\d{2})[\/-](\d{2})/);
            if (dateMatch) {
                date = `${dateMatch[1]}-${dateMatch[2]}-${dateMatch[3]}`;
                // 检查是否是日记格式（路径包含日期）
                if (filePath.match(/\d{4}[\/-]\d{2}[\/-]\d{2}/)) {
                    isDiary = true;
                }
            }
            
            // 提取任务（包括子项中的标签）
            const tasks = [];
            const taskTags = new Set();
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!/\?"i])\]\s*(.+)$/);
                if (taskMatch) {
                    const status = taskMatch[1];
                    const text = taskMatch[2];
                    
                    // 提取标签
                    const lineTagMatch = text.match(/#([a-zA-Z0-9\/]+)/g);
                    if (lineTagMatch) {
                        lineTagMatch.forEach(tag => taskTags.add(tag.substring(1)));
                    }
                    
                    // 提取子项
                    const subItems = [];
                    let j = i + 1;
                    while (j < lines.length) {
                        const subLine = lines[j];
                        if (subLine.match(/^(\t|  )/)) {
                            const subText = subLine.replace(/^[\t ]+/, '').trim();
                            // 提取子项中的标签
                            const subTagMatch = subText.match(/#([a-zA-Z0-9\/]+)/g);
                            if (subTagMatch) {
                                subTagMatch.forEach(tag => taskTags.add(tag.substring(1)));
                            }
                            subItems.push(subText);
                            j++;
                        } else {
                            break;
                        }
                    }
                    
                    tasks.push({
                        status,
                        text,
                        subItems: subItems.length > 0 ? subItems : null
                    });
                }
            }
            
            // 提取标题
            let title;
            if (isDiary && date) {
                // 日记文件：标题就是日期
                title = date;
            } else {
                // 普通文件：从文件名或第一个 # 标题获取
                title = filePath.split('/').pop().replace('.md', '');
                for (let i = bodyStart; i < lines.length; i++) {
                    const headerMatch = lines[i].match(/^#\s+(.+)$/);
                    if (headerMatch) {
                        title = headerMatch[1].trim();
                        break;
                    }
                }
            }
            
            // 收集所有 frontmatter 作为 meta tags
            const metaTags = [];
            for (const [key, value] of Object.entries(frontmatter)) {
                if (key !== 'tags' && value) {
                    metaTags.push({ key, value });
                }
            }
            
            // 提取完整正文内容（排除 frontmatter、代码块、Done/Scheduled/Pending 区域）
            let bodyContent = [];
            let inCodeBlock = false;
            let inDoneSection = false;
            let inScheduledSection = false;
            let inPendingSection = false;
            
            for (let i = bodyStart; i < lines.length; i++) {
                const line = lines[i];
                
                // 检查是否进入 Done 部分
                if (line.match(/^##?\s*Done\s*$/i)) {
                    inDoneSection = true;
                    inScheduledSection = false;
                    inPendingSection = false;
                    continue;
                }
                
                // 检查是否进入 Scheduled 部分
                if (line.match(/^##?\s*Scheduled\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = true;
                    inPendingSection = false;
                    continue;
                }
                
                // 检查是否进入 Pending 部分
                if (line.match(/^##?\s*Pending\s*$/i)) {
                    inDoneSection = false;
                    inScheduledSection = false;
                    inPendingSection = true;
                    continue;
                }
                
                // 如果在 Done/Scheduled/Pending 区域，跳过
                if (inDoneSection || inScheduledSection || inPendingSection) {
                    // 检查是否是新的同级或上级标题（## 或 # 开头）
                    if (line.match(/^#{1,2}\s+[^#]/)) {
                        inDoneSection = false;
                        inScheduledSection = false;
                        inPendingSection = false;
                    } else {
                        continue;
                    }
                }
                
                // 跳过代码块标记
                if (line.startsWith('```')) {
                    inCodeBlock = !inCodeBlock;
                    continue;
                }
                // 在代码块内，跳过
                if (inCodeBlock) {
                    continue;
                }
                
                // 保留所有内容（包括任务行）
                bodyContent.push(line);
            }
            
            return {
                title,
                filePath,
                date,
                tasks,
                tags: frontmatter.tags ? frontmatter.tags.split(',').map(t => t.trim()) : [],
                taskTags: Array.from(taskTags),
                metaTags,
                body: bodyContent.join('\n').trim(),
                // 提取所有层级的标签（用于筛选）
                allTags: extractAllTags(bodyContent.join('\n'))
            };
        }

        // 提取所有层级标签
        function extractAllTags(text) {
            const tagRegex = /#([a-zA-Z0-9\/]+)/g;
            const tags = new Set();
            let match;
            while ((match = tagRegex.exec(text)) !== null) {
                tags.add(match[1]);
            }
            return Array.from(tags);
        }

        // 获取顶级标签（没有子标签的标签）
        function getTopLevelTags(allTags) {
            const sorted = allTags.sort();
            return sorted.filter(tag => {
                // 检查是否有其他标签以此标签为前缀
                const hasParent = sorted.some(other => 
                    other !== tag && (other.startsWith(tag + '/'))
                );
                return !hasParent;
            });
        }

        // 递归获取子标签
        function getChildTags(parentTag, allTags) {
            return allTags.filter(tag => 
                tag.startsWith(parentTag + '/') && 
                !tag.slice(parentTag.length + 1).includes('/')
            );
        }

        // 渲染笔记列表
        function renderNotes() {
            const notesList = document.getElementById('notesList');
            const notesTitle = document.getElementById('notesTitle');
            
            notesTitle.textContent = `笔记列表 (${filteredNotes.length})`;
            
            if (filteredNotes.length === 0) {
                notesList.innerHTML = `
                    <div class="empty-state">
                        <h3>没有找到笔记</h3>
                        <p>尝试调整搜索或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            // 按日期排序
            filteredNotes.sort((a, b) => {
                if (!a.date && !b.date) return 0;
                if (!a.date) return 1;
                if (!b.date) return -1;
                return new Date(b.date) - new Date(a.date);
            });
            
            notesList.innerHTML = filteredNotes.map(note => renderNoteCard(note)).join('');
        }

        // 渲染笔记卡片
        function renderNoteCard(note) {
            const dateStr = note.date ? new Date(note.date).toLocaleDateString('zh-CN') : '';
            
            // 渲染 YAML meta tags
            let metaHtml = '';
            if (note.metaTags && note.metaTags.length > 0) {
                metaHtml = `<div style="margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px;">
                    ${note.metaTags.map(meta => `
                        <span style="color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;">
                            ${meta.key}: <span style="color: var(--text-secondary);">${meta.value}</span>
                        </span>
                    `).join('')}
                </div>`;
            }
            
            // 渲染完整内容（包括任务）
            let bodyHtml = '';
            if (note.body) {
                bodyHtml = `<div style="margin-top: 10px; font-size: 14px; line-height: 1.6;">${renderMarkdownWithTasks(note.body)}</div>`;
            }
            
            // 渲染标签（Obsidian 风格）
            let tagsHtml = '';
            if (note.tags.length > 0) {
                tagsHtml = `<div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                    ${note.tags.map(tag => `<a href="#" onclick="event.stopPropagation(); toggleTag('${tag}'); return false;" style="color: var(--tag-color); text-decoration: none; font-size: 13px;">#${tag}</a>`).join('')}
                </div>`;
            }
            
            return `
                <div class="note-item-full" onclick="showNoteDetail('${note.filePath}')">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 2px solid var(--accent-color);">
                        <div style="font-size: 18px; font-weight: 600;">${note.title}</div>
                        <div style="font-size: 13px; color: var(--text-muted); white-space: nowrap;">
                            ${dateStr ? `📅 ${dateStr}` : ''}
                        </div>
                    </div>
                    ${metaHtml}
                    ${bodyHtml}
                    ${tagsHtml}
                </div>
            `;
        }

        // 获取任务图标
        function getTaskIcon(status) {
            const icons = {
                'x': '✅',
                '*': '⭐',
                '-': '❌',
                '!': '❗',
                '/': '🔄',
                'i': 'ℹ️',
                '?': '❓',
                '"': '💬',
                ' ': '⭕'
            };
            return icons[status] || '⭕';
        }

        // 渲染任务文本（处理标签）
        function renderTaskText(text) {
            return text.replace(/#([a-zA-Z0-9/]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
        }

        // Markdown 渲染器（处理任务）
        function renderMarkdownWithTasks(text) {
            if (!text) return '';
            
            // 删除代码块
            let html = text.replace(/```[\s\S]*?```/g, '');
            
            // 处理任务行（特殊渲染，包括子项）
            const lines = html.split('\n');
            let result = [];
            let currentTask = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const taskMatch = line.match(/^-\s*\[([ x\-*!\/?i])\]\s*(.+)$/);
                
                if (taskMatch) {
                    // 渲染上一个任务（如果有）
                    if (currentTask) {
                        result.push(currentTask.html);
                    }
                    
                    // 开始新任务
                    const [_, status, taskText] = taskMatch;
                    const icon = getTaskIcon(status);
                    currentTask = {
                        html: `<div style="display: flex; align-items: flex-start; gap: 8px; margin: 8px 0; padding: 8px 0; border-bottom: 1px solid var(--border-color);">
                            <span style="font-size: 16px; flex-shrink: 0;">${icon}</span>
                            <div style="flex: 1;">${renderTaskText(taskText)}</div>
                        </div>`,
                        subItems: []
                    };
                } else if (currentTask && (line.match(/^(\t|  )/) || line.trim() === '')) {
                    // 收集子项
                    if (line.trim()) {
                        currentTask.subItems.push(line.replace(/^[\t ]+/, ''));
                    }
                } else {
                    // 渲染当前任务（如果有）
                    if (currentTask) {
                        let taskHtml = currentTask.html;
                        if (currentTask.subItems.length > 0) {
                            taskHtml = taskHtml.replace('</div>', 
                                `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                                    ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                                </div></div>`);
                        }
                        result.push(taskHtml);
                        currentTask = null;
                    }
                    result.push(line);
                }
            }
            
            // 处理最后一个任务
            if (currentTask) {
                let taskHtml = currentTask.html;
                if (currentTask.subItems.length > 0) {
                    taskHtml = taskHtml.replace('</div>', 
                        `<div style="margin-top: 8px; padding-left: 24px; border-left: 2px solid var(--border-color);">
                            ${currentTask.subItems.map(item => `<div style="margin: 4px 0; font-size: 14px; color: var(--text-secondary); white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                        </div></div>`);
                }
                result.push(taskHtml);
            }
            
            html = result.join('\n');
            
            // 处理标题
            html = html.replace(/^###\s+(.+)$/gm, '<h3 style="font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: var(--text-primary);">$1</h3>');
            html = html.replace(/^##\s+(.+)$/gm, '<h2 style="font-size: 18px; font-weight: 600; margin: 20px 0 10px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 6px;">$1</h2>');
            html = html.replace(/^#\s+(.+)$/gm, '<h1 style="font-size: 20px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary);">$1</h1>');
            
            // 处理粗体和斜体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // 处理行内代码
            html = html.replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 0.9em;">$1</code>');
            
            // 处理标签
            html = html.replace(/#([a-zA-Z0-9/_-]+)/g, '<a href="#" onclick="event.stopPropagation(); toggleTag(\'$1\'); return false;" style="color: var(--tag-color); text-decoration: none;">#$1</a>');
            
            // 处理链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color: var(--accent-color); text-decoration: none;">$1</a>');
            
            // 处理内部链接
            html = html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$2</span>');
            html = html.replace(/\[\[([^\]]+)\]\]/g, '<span style="color: var(--accent-color); cursor: pointer;">$1</span>');
            
            // 处理列表（非任务）
            html = html.replace(/^-\s+(.+)$/gm, '<li style="margin: 4px 0; margin-left: 20px;">$1</li>');
            html = html.replace(/(<li[^>]*>.*<\/li>)/s, '<ul style="margin: 8px 0; padding-left: 20px;">$1</ul>');
            
            // 处理引用块
            html = html.replace(/^>\s+(.+)$/gm, '<blockquote style="border-left: 3px solid var(--accent-color); padding-left: 12px; margin: 10px 0; color: var(--text-secondary);">$1</blockquote>');
            
            // 处理分隔线
            html = html.replace(/^---$/gm, '<hr style="border: none; border-top: 1px solid var(--border-color); margin: 20px 0;">');
            
            // 处理换行
            html = html.replace(/\n\n/g, '</p><p style="margin: 10px 0;">');
            html = '<p style="margin: 10px 0;">' + html + '</p>';
            html = html.replace(/<p style="margin: 10px 0;"><\/p>/g, '');
            
            return html;
        }

        // 筛选笔记
        function filterNotes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // 获取选中的状态
            const checkedStatuses = [];
            document.querySelectorAll('#statusFilter input[type="checkbox"]:checked').forEach(function(cb) {
                checkedStatuses.push(cb.value);
            });
            
            filteredNotes = allNotes.filter(function(note) {
                // 搜索筛选
                if (searchTerm) {
                    const searchInTitle = note.title.toLowerCase().includes(searchTerm);
                    const searchInBody = note.body && note.body.toLowerCase().includes(searchTerm);
                    const searchInPath = note.filePath.toLowerCase().includes(searchTerm);
                    const searchInTasks = note.tasks && note.tasks.some(function(task) { 
                        return task.text.toLowerCase().includes(searchTerm) || 
                               (task.subItems && task.subItems.some(function(sub) { return sub.toLowerCase().includes(searchTerm); }));
                    });
                    
                    if (!searchInTitle && !searchInBody && !searchInPath && !searchInTasks) {
                        return false;
                    }
                }
                
                // 标签筛选
                if (selectedTags.size > 0) {
                    const allNoteTags = [...note.tags, ...(note.taskTags || [])];
                    let hasMatchingTag = false;
                    var tagIter, noteTagIter, selectedTag, noteTag;
                    
                    for (tagIter = selectedTags.values(); !(noteTagIter = tagIter.next()).done; ) {
                        selectedTag = noteTagIter.value;
                        for (noteTagIter = allNoteTags.values(); !(noteTag = noteTagIter.next()).done; ) {
                            noteTag = noteTag.value;
                            if (noteTag === selectedTag || noteTag.startsWith(selectedTag + '/')) {
                                hasMatchingTag = true;
                                break;
                            }
                        }
                        if (hasMatchingTag) break;
                    }
                    
                    if (!hasMatchingTag) return false;
                }
                
                // 状态筛选
                if (checkedStatuses.length > 0 && checkedStatuses.length < 9) {
                    const hasMatchingStatus = note.tasks && note.tasks.some(function(task) { 
                        return checkedStatuses.indexOf(task.status) !== -1;
                    });
                    if (!hasMatchingStatus) return false;
                }
                
                return true;
            });
            
            renderNotes();
            updateStats();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalNotes').textContent = allNotes.length;
            document.getElementById('filteredNotes').textContent = filteredNotes.length;
        }

        // 更新标签云
        function updateTagCloud() {
            var tagCount = {};
            allNotes.forEach(function(note) {
                var allNoteTags = note.tags.concat(note.taskTags || []);
                allNoteTags.forEach(function(tag) {
                    tagCount[tag] = (tagCount[tag] || 0) + 1;
                });
            });
            
            var tagCloud = document.getElementById('tagCloud');
            var allTags = Object.keys(tagCount).sort();
            
            // 全部选项
            var allActive = selectedTags.size === 0;
            var html = '<div class="tag-pill ' + (allActive ? 'active' : '') + '" onclick="clearAllTags()" style="margin-bottom: 8px; cursor: pointer;">全部</div>';
            
            // 构建标签层级
            var tagHierarchy = {};
            allTags.forEach(function(tag) {
                var parts = tag.split('/');
                var current = tagHierarchy;
                for (var i = 0; i < parts.length; i++) {
                    var path = parts.slice(0, i + 1).join('/');
                    if (!current[path]) {
                        current[path] = { count: 0, children: {} };
                    }
                    if (i === parts.length - 1) {
                        current[path].count = tagCount[tag];
                    }
                    current = current[path].children;
                }
            });
            
            // 渲染标签树
            function renderTagTree(node, level) {
                level = level || 0;
                var html = '';
                var keys = Object.keys(node).sort();
                keys.forEach(function(tag) {
                    var data = node[tag];
                    var isActive = selectedTags.has(tag);
                    var hasChildren = Object.keys(data.children).length > 0;
                    var marginLeft = level * 12;
                    var displayName = tag.split('/').pop();
                    var countStr = data.count > 0 ? '(' + data.count + ')' : '';
                    
                    html += '<div class="tag-pill ' + (isActive ? 'active' : '') + '" ' +
                            'onclick="toggleTag(\'' + tag.replace(/'/g, "\\'") + '\')" ' +
                            'style="margin-left: ' + marginLeft + 'px; margin-bottom: 2px; display: inline-block; cursor: pointer;">' +
                            displayName + ' ' + countStr + '</div>';
                    
                    if (hasChildren) {
                        html += renderTagTree(data.children, level + 1);
                    }
                });
                return html;
            }
            
            html += renderTagTree(tagHierarchy);
            tagCloud.innerHTML = html;
        }

        // 切换标签
        function toggleTag(tag) {
            if (selectedTags.has(tag)) {
                selectedTags.delete(tag);
            } else {
                selectedTags.add(tag);
            }
            updateTagCloud();
            filterNotes();
        }

        // 清除所有标签
        function clearAllTags() {
            selectedTags.clear();
            updateTagCloud();
            filterNotes();
        }

        // 刷新笔记
        async function refreshNotes() {
            if (directoryHandle) {
                await loadNotes();
            } else {
                showMessage('请先选择文件夹', 'error');
            }
        }

        // 显示笔记详情（全文）
        function showNoteDetail(filePath) {
            const note = allNotes.find(n => n.filePath === filePath);
            if (!note) return;
            
            // 显示全文内容
            const notesList = document.getElementById('notesList');
            const notesTitle = document.getElementById('notesTitle');
            
            notesTitle.textContent = note.title;
            
            // 构建完整内容
            let fullContent = '';
            
            // 添加 meta 信息
            if (note.date) {
                fullContent += `<div style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;">📅 ${note.date}</div>`;
            }
            
            // 添加 meta tags
            if (note.metaTags && note.metaTags.length > 0) {
                fullContent += '<div style="margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px;">';
                fullContent += note.metaTags.map(meta => 
                    `<span style="color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;">${meta.key}: <span style="color: var(--text-secondary);">${meta.value}</span></span>`
                ).join('');
                fullContent += '</div>';
            }
            
            // 添加任务
            if (note.tasks && note.tasks.length > 0) {
                fullContent += '<div style="margin-bottom: 20px;">';
                note.tasks.forEach(task => {
                    const icon = getTaskIcon(task.status);
                    fullContent += `
                        <div style="display: flex; align-items: flex-start; gap: 8px; margin: 8px 0;">
                            <span style="font-size: 16px;">${icon}</span>
                            <div style="flex: 1;">
                                <div>${renderTaskText(task.text)}</div>
                                ${task.subItems ? `
                                    <div style="margin-top: 4px; padding-left: 12px; font-size: 13px; color: var(--text-secondary);">
                                        ${task.subItems.map(item => `<div style="margin: 2px 0; white-space: pre-wrap;">${renderTaskText(item)}</div>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
                fullContent += '</div>';
            }
            
            // 添加正文
            if (note.body) {
                fullContent += `<div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">${renderMarkdown(note.body)}</div>`;
            }
            
            // 添加标签
            if (note.tags.length > 0) {
                fullContent += `<div style="margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap;">`;
                fullContent += note.tags.map(tag => 
                    `<a href="#" onclick="event.stopPropagation(); toggleTag('${tag}'); return false;" style="color: var(--tag-color); text-decoration: none; font-size: 13px;">#${tag}</a>`
                ).join('');
                fullContent += '</div>';
            }
            
            // 添加返回按钮
            fullContent += `
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <button onclick="renderNotes()" style="padding: 8px 16px; background: var(--accent-color); color: white; border: none; border-radius: 6px; cursor: pointer;">返回列表</button>
                </div>
            `;
            
            notesList.innerHTML = `<div class="note-item-full" style="max-width: none; cursor: default;">${fullContent}</div>`;
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            const existing = document.querySelector('.message');
            if (existing) existing.remove();
            
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = message;
            document.body.appendChild(msg);
            
            setTimeout(() => msg.remove(), 3000);
        }

        // 切换暗黑模式
        function toggleDarkMode() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
            
            // 检测浏览器兼容性
            if (!isFileSystemAccessSupported()) {
                document.getElementById('browserWarning').style.display = 'block';
                console.log('Safari/Firefox 兼容模式已启用');
            }
        });
    </script>
</body>
